<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Luna and The Lost Wedding Rings</title>

<style>

image-rendering: pixelated;

:root {
--vh: 1vh;
}


@font-face {
font-family: 'DeliusSwash';
src: url('Rabbits-Goody.woff2');
}

@font-face {

*, *::before, *::after {

}

html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;

display: flex;
justify-content: center;
align-items: center;

canvas {

</head>

<body>

<canvas id="game" width="420" height="700"></canvas>

<script>

/* IMAGE LOADING TRACKER */

let loadedCount = 0
let totalImages = 0
let allImagesLoaded = false

function loadImage(src){
totalImages++
const img = new Image()
img.onload = () => {
loadedCount++
if(loadedCount >= totalImages){
allImagesLoaded = true
}
}
img.onerror = () => {
// count errors too so we don't hang forever on missing files
loadedCount++
if(loadedCount >= totalImages) allImagesLoaded = true
}
img.src = src
return img
}

const loadingScreen    = loadImage("loadingscreen.png")
const startScreen      = loadImage("startscreen.png")
const lunaFace         = loadImage("lunaface.png")
const gardenStoryImg   = loadImage("gardenstory.png")
const coastalStoryImg  = loadImage("coastalstory.png")
const villageStoryImg  = loadImage("villagestory.png")
const altarStoryImg    = loadImage("altarstory.png")
const controlsScreen   = loadImage("controlsscreen.png")
const villageTiles     = loadImage("village_tiles.png")
const sprites          = loadImage("sprites.png")
const tileset          = loadImage("tileset.png")
const grasstile        = loadImage("grasstile.png")
const dughole          = loadImage("dughole.png")
const flowergrass      = loadImage("flowergrass.png")
const ringbox          = loadImage("ringbox.png")
const tulip            = loadImage("tulip.png")
const witheredTulip    = loadImage("witheredtulip.png")
const gravybone        = loadImage("gravybone.png")
const sea              = loadImage("sea.png")
const luna1            = loadImage("luna1.png")
const luna2            = loadImage("luna2.png")
const lunaDig          = loadImage("lunadig.png")
const lunaWalk1        = loadImage("lunawalk1.png")
const lunaWalk2        = loadImage("lunawalk2.png")
const lunaFrontWalk1   = loadImage("lunafrontwalk1.png")
const lunaFrontWalk2   = loadImage("lunafrontwalk2.png")
const lunaJump1        = loadImage("lunajump1.png")
const lunaJump2        = loadImage("lunajump2.png")
const lunaDown1        = loadImage("lunadown1.png")
const lunaDown2        = loadImage("lunadown2.png")
const whiteflower      = loadImage("whiteflower.png")
const purplegrass      = loadImage("purplegrass.png")
const houseRow         = loadImage("house-row.png")
const path             = loadImage("path.png")
const sandpath         = loadImage("sandpath.png")
const jonny1           = loadImage("jonny1.png")
const jonnyJump1       = loadImage("jonnyjump1.png")
const jonny2           = loadImage("jonny1.png")   // placeholder — swap jonny2.png when ready
const jonny3           = loadImage("jonny1.png")   // placeholder — swap jonny3.png when ready
const bggrass          = loadImage("bggrass.png")
const lottie1          = loadImage("lottie1.png")
const lottieJump1      = loadImage("lottiejump1.png")
const lottie2          = loadImage("lottie1.png")  // placeholder — swap lottie2.png when ready
const lottie3          = loadImage("lottie1.png")  // placeholder — swap lottie3.png when ready
const ringStoryImg     = loadImage("ringstory.png")
const flowerpot        = loadImage("flowerpot.png")
const crate            = loadImage("crate.png")
const wall             = loadImage("wall.png")
const seagull          = loadImage("seagull.png")
const bgpath           = loadImage("bgpath.png")
const house1           = loadImage("house1.png")
const house2           = loadImage("house2.png")
const house3           = loadImage("house3.png")
const house4           = loadImage("house4.png")
const btnLeft          = loadImage("buttonleft.png")
const btnRight         = loadImage("buttonright.png")
const btnUp            = loadImage("buttonupjump.png")
const btnDown          = loadImage("buttondown.png")
const btnAction        = loadImage("buttonaction.png")
const grassplatform    = loadImage("grassplatform.png")
const doublegrassplatform = loadImage("doublegrassplatform.png")
const arch             = loadImage("arch.png")
const aisleTile        = loadImage("aisletile.png")
const winScreen        = loadImage("winscreen.png")

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

ctx.imageSmoothingEnabled = false

const DPR = window.devicePixelRatio || 1

const W = 420
const H = 700
const UI_H = 68           // height of the solid UI bar at the top

canvas.width = W * DPR
canvas.height = H * DPR

canvas.style.width = W + "px"
canvas.style.height = H + "px"

ctx.scale(DPR, DPR)

const isMobile = "ontouchstart" in window


const startMusic = new Audio("startscreenmusic.mp3")
startMusic.loop = true
startMusic.volume = 0
startMusic.muted = true  // disabled for now

const houses = [house1, house2, house3, house4]

let dust = []

let meadowFlowers=[]

let state = "start"
let controlsTimer = 0
let gardenStorySpacePressedLastFrame = false
let coastalStorySpacePressedLastFrame = false
let villageStorySpacePressedLastFrame = false
let altarStorySpacePressedLastFrame = false
let postRunnerStorySpacePressedLastFrame = false
let postRunnerTimer = 0   // counts frames through the animated scene
let storyJustEntered = false

let confetti = []

let showRingPopup = false
let ringAnimTimer = 0
let ringAnimSpot = null
let popupFadeTimer = 0

let spacePressedLastFrame = false

let previousState = "start"

let digTimer = 0
let nearDigSpot = false

let fadeAlpha = 0
let fadeDir = 0       // 0=none, 1=fading out, -1=fading in
let fadeTarget = ""   // state to switch to when fade out completes

let touchLeft = false
let touchRight = false
let touchJump = false
let jumpHeld = false          // true while jump button is physically held
let landTimer = 0             // frames to show lunaDown2 after landing
const LAND_FRAMES = 10        // how long lunaDown2 shows on landing
let touchDig = false
let touchDigFired = false
let tapToContinue = false

let touchUp = false
let touchDown = false

const joystick = {
x: 105,          // fixed centre X
y: H - 100,      // fixed centre Y
outerR: 46,      // outer ring radius
innerR: 22,      // nub radius
deadZone: 10,    // ignore tiny movements
nubX: 105,       // current nub draw position
nubY: H - 100,
active: false
}

const actionButton = {
x: W - 90,
y: H - 100,
r: 46
}

const startButton = {
x: W/2 - 130,
y: 617,
w: 260,
h: 60
}


/* PLAYER */

const luna = {
x:200,
y:500,
vx:0,
vy:0,
ground:false,
dir:1
}

const couple = {
x: W/2,
y: 220
}

/* UI */

let energy=100
let hasRing=false
let flowers=0
let bonesEaten=0

/* INPUT */

const keys = {}

window.addEventListener("keydown", e => {

keys[e.key] = true

/* DEV LEVEL SKIP */

if(e.key === "1"){
state = "garden"
generateDigSpots()
}

if(e.key === "2"){
state = "coastal"
luna.x = 50
luna.y = 500
scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
seagullsCoastal = []
initCoastalPlatforms()
}

if(e.key === "3"){
state = "village"
luna.x = 100
luna.y = 500
}

if(e.key === "4"){
state = "altar"
runnerLane = 1; runnerTargetLane = 1; runnerLaneX = W*0.5
runnerProgress = 0; runnerTileOffset = 0; initRunnerFlowers()
rhythmState = "walking"
luna.x = W*0.5; luna.y = H - 160
}

/* START GAME (SPACE) */

if(state === "start" && e.key === " "){
startGame()
}

if((state === "coastal" || state === "village") && e.key === " ") jumpHeld = true

/* RHYTHM GAME KEYBOARD INPUT */

if(RHYTHM_GAME_ENABLED && state === "altar" && rhythmState === "minigame" && !e.repeat){
if(e.key === "ArrowLeft"  || e.key === "z" || e.key === "Z") { rhythmJustPressed[0]=true; checkRhythmInput(0); rhythmJustPressed[0]=false }
if(e.key === "ArrowUp"   || e.key === "x" || e.key === "X") { rhythmJustPressed[1]=true; checkRhythmInput(1); rhythmJustPressed[1]=false }
if(e.key === " " || e.key === "ArrowDown" || e.key === "," ) { rhythmJustPressed[2]=true; checkRhythmInput(2); rhythmJustPressed[2]=false }
if(e.key === "ArrowRight" || e.key === "." || e.key === "/") { rhythmJustPressed[3]=true; checkRhythmInput(3); rhythmJustPressed[3]=false }
}

})

window.addEventListener("keyup", e => {
keys[e.key] = false
if(e.key === " ") jumpHeld = false
})


/* TOUCH START (START BUTTON) */

canvas.addEventListener("click", e => {

let rect = canvas.getBoundingClientRect()
let x = (e.clientX - rect.left) * (W / rect.width)
let y = (e.clientY - rect.top) * (H / rect.height)

if(state === "win" &&
x > W/2-110 && x < W/2+110 &&
y > 416 && y < 492){
restartGame()
}

if(state === "win" &&
x > W/2-120 && x < W/2+120 &&
y > 484 && y < 560){
// confetti cannon! - sides AND top
for(let i=0;i<40;i++){
  let side = Math.random() < 0.5 ? 0 : W
  confetti.push({ x:side, y:H*0.2+Math.random()*H*0.6, vx:(side===0?1:-1)*(Math.random()*6+3), vy:(Math.random()-0.5)*6, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.25, isTulip:true })
}
for(let i=0;i<25;i++){
  confetti.push({ x:Math.random()*W, y:0, vx:(Math.random()-0.5)*5, vy:Math.random()*5+2, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.25, isTulip:true })
}
}

if(state === "gameover" &&
x > W/2-100 && x < W/2+100 &&
y > 460 && y < 510){
restartGame()
}

if(RHYTHM_GAME_ENABLED && state === "altar" && rhythmState === "failed" &&
x > W/2-100 && x < W/2+100 &&
y > 380 && y < 430){
initRhythmGame()
}
})

canvas.addEventListener("touchmove", e => {
e.preventDefault()

let rect = canvas.getBoundingClientRect()

touchLeft  = false
touchRight = false
touchUp    = false
touchDown  = false

for(let i = 0; i < e.touches.length; i++){
  let t = e.touches[i]
  let tx = (t.clientX - rect.left) * (W / rect.width)
  let ty = (t.clientY - rect.top)  * (H / rect.height)

  if(tx < W / 2 && ty > H / 2){
    let dx = tx - joystick.x
    let dy = ty - joystick.y
    let dist = Math.sqrt(dx*dx + dy*dy)
    let clamped = Math.min(dist, joystick.outerR)
    let angle = Math.atan2(dy, dx)
    joystick.nubX = joystick.x + Math.cos(angle) * clamped
    joystick.nubY = joystick.y + Math.sin(angle) * clamped
    if(dist > joystick.deadZone){
      // dominant axis wins — prevents diagonal movement
      if(Math.abs(dx) >= Math.abs(dy)){
        touchLeft  = dx < 0
        touchRight = dx > 0
        touchUp    = false
        touchDown  = false
      } else {
        touchLeft  = false
        touchRight = false
        touchUp    = dy < 0
        touchDown  = dy > 0
      }
    }
  }
}

}, { passive: false })

canvas.addEventListener("touchstart", e => {

e.preventDefault()

let rect = canvas.getBoundingClientRect()
let touch = e.touches[0]

let x = (touch.clientX - rect.left) * (W / rect.width)
let y = (touch.clientY - rect.top) * (H / rect.height)

tapToContinue = true


if(state === "start" &&
x > startButton.x - 10 &&
x < startButton.x + startButton.w + 10 &&
y > startButton.y - 10 &&
y < startButton.y + startButton.h + 10
){
startGame()
}


// Story screens — must tap the continue button (generous 40px margin)
const STORY_BTN_BW = 220, STORY_BTN_BH = 56
const STORY_BTN_X  = W/2 - STORY_BTN_BW/2
const STORY_BTN_Y  = H - 175
const STORY_BTN_MARGIN = 40
const storyBtnHit = x > STORY_BTN_X - STORY_BTN_MARGIN &&
                    x < STORY_BTN_X + STORY_BTN_BW + STORY_BTN_MARGIN &&
                    y > STORY_BTN_Y - STORY_BTN_MARGIN &&
                    y < STORY_BTN_Y + STORY_BTN_BH + STORY_BTN_MARGIN

if(state === "gardenstory" && !storyJustEntered && storyBtnHit){
gardenStorySpacePressedLastFrame = true
state = "garden"
generateDigSpots()
digTimer = 0
fadeOutStartMusic(null)
}

if(state === "coastalstory" && !storyJustEntered && storyBtnHit){
coastalStorySpacePressedLastFrame = true
state = "coastal"
luna.x = 50
luna.y = 500
scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
seagullsCoastal = []
initCoastalPlatforms()
}

if(state === "villagestory" && !storyJustEntered && storyBtnHit){
villageStorySpacePressedLastFrame = true
state = "village"
scroll = 0
obstacles = []
bonesVillage = []
flowersVillage = []
luna.x = 100
luna.y = 540
}

if(state === "altarstory" && !storyJustEntered && storyBtnHit){
altarStorySpacePressedLastFrame = true
state = "altar"
runnerLane = 1
runnerTargetLane = 1
runnerLaneX = W * 0.5
runnerProgress = 0
runnerTileOffset = 0
initRunnerFlowers()
runnerInputLock = false
luna.x = W * 0.5
luna.y = H - 160
}


if(state === "win" &&
x > W/2-110 && x < W/2+110 &&
y > 416 && y < 492){
restartGame()
}

if(state === "win" &&
x > W/2-120 && x < W/2+120 &&
y > 484 && y < 560){
for(let i=0;i<40;i++){
  let side = Math.random() < 0.5 ? 0 : W
  confetti.push({ x:side, y:H*0.2+Math.random()*H*0.6, vx:(side===0?1:-1)*(Math.random()*6+3), vy:(Math.random()-0.5)*6, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.25, isTulip:true })
}
for(let i=0;i<25;i++){
  confetti.push({ x:Math.random()*W, y:0, vx:(Math.random()-0.5)*5, vy:Math.random()*5+2, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.25, isTulip:true })
}
}

if(state === "gameover" &&
x > W/2-100 && x < W/2+100 &&
y > 460 && y < 510){
restartGame()
}

if(RHYTHM_GAME_ENABLED && state === "altar" && rhythmState === "failed" &&
x > W/2-100 && x < W/2+100 &&
y > 380 && y < 430){
initRhythmGame()
}

/* JOYSTICK + ACTION BUTTON */

for(let i = 0; i < e.touches.length; i++){
  let t  = e.touches[i]
  let tx = (t.clientX - rect.left) * (W / rect.width)
  let ty = (t.clientY - rect.top)  * (H / rect.height)

  // Aisle L/R buttons (altar walking)
  if(state === "altar" && rhythmState === "walking"){
    const aBtnR = 64, aBtnY = H - 100
    if(Math.sqrt((tx-105)**2+(ty-aBtnY)**2) < aBtnR){ touchLeft = true }
    if(Math.sqrt((tx-(W-105))**2+(ty-aBtnY)**2) < aBtnR){ touchRight = true }
  }

  // Joystick: left half of screen (not aisle)
  if(tx < W / 2 && ty > H / 2 && !(state === "altar" && rhythmState === "walking")){
    joystick.active = true
    let dx = tx - joystick.x
    let dy = ty - joystick.y
    let dist = Math.sqrt(dx*dx + dy*dy)
    let clamped = Math.min(dist, joystick.outerR)
    let angle = Math.atan2(dy, dx)
    joystick.nubX = joystick.x + Math.cos(angle) * clamped
    joystick.nubY = joystick.y + Math.sin(angle) * clamped
    if(dist > joystick.deadZone){
      // dominant axis wins — prevents diagonal movement
      if(Math.abs(dx) >= Math.abs(dy)){
        touchLeft  = dx < 0
        touchRight = dx > 0
        touchUp    = false
        touchDown  = false
      } else {
        touchLeft  = false
        touchRight = false
        touchUp    = dy < 0
        touchDown  = dy > 0
      }
    }
  }

  // Action button: right half of screen
  let adx = tx - actionButton.x
  let ady = ty - actionButton.y
  if(Math.sqrt(adx*adx + ady*ady) < actionButton.r * 1.3){
    if(showRingPopup){
      showRingPopup = false
      state = "coastalstory"
      storyJustEntered = true
      coastalStorySpacePressedLastFrame = true
    } else if(state === "altar" && rhythmState === "minigame"){
      if(!rhythmColHeld[1]){ rhythmJustPressed[1]=true; checkRhythmInput(1); rhythmJustPressed[1]=false; rhythmColHeld[1] = true }
    } else if(state === "garden"){
      if(nearDigSpot && digTimer === 0){
        digTimer = 12
        touchDigFired = true
      }
    } else {
      luna.vy = -8
      jumpHeld = true
    }
  }

  // rhythm game - 4 columns tapped at bottom
  if(RHYTHM_GAME_ENABLED && state === "altar" && rhythmState === "minigame"){
    for(let col = 0; col < 4; col++){
      let cx = rhythmColX(col)
      if(Math.abs(tx - cx) < 40 && ty > H - 110){
        if(!rhythmColHeld[col]){ rhythmJustPressed[col]=true; checkRhythmInput(col); rhythmJustPressed[col]=false; rhythmColHeld[col]=true }
      }
    }
  }
}

})

canvas.addEventListener("touchend", e => {

// Only reset joystick if no touches remain on left half
let rect = canvas.getBoundingClientRect()
let anyLeft = false
for(let i = 0; i < e.touches.length; i++){
  let tx = (e.touches[i].clientX - rect.left) * (W / rect.width)
  if(tx < W / 2 && ty > H / 2) anyLeft = true
}
if(!anyLeft){
  joystick.active = false
  joystick.nubX = joystick.x
  joystick.nubY = joystick.y
  touchLeft  = false
  touchRight = false
  touchUp    = false
  touchDown  = false
}

touchJump = false
jumpHeld = false
touchDig = false
rhythmColHeld = [false, false, false, false]

})



/* START SCREEN */

function updateStart(){

if(keys[" "] || keys["Space"] || keys["Spacebar"] || touchJump){
startGame()
}

}

function drawLuna(){

let frame = luna1
let bob = 0

/* DIGGING (garden level) */

if(state === "garden" && digTimer > 0){
frame = lunaDig
}

/* ── COASTAL / VILLAGE: jump, fall, land, or run by default ── */

else if(state === "coastal" || state === "village"){

  if(landTimer > 0){
    // just landed — brief lunaDown2 flash
    frame = lunaDown2
    bob = 0
  } else if(luna.vy < 0){
    // rising — jump held = lunaJump1, released = lunaJump2
    frame = jumpHeld ? lunaJump1 : lunaJump2
    bob = 0
  } else if(luna.vy > 1.5){
    // falling off a cliff (> 1.5 distinguishes airborne from the tiny gravity tick on ground)
    frame = lunaDown1
    bob = 0
  } else {
    // grounded — always run (luna1 / luna2 alternating), no key press needed
    let step = Math.floor(Date.now() / 160) % 2
    frame = step ? luna1 : luna2
    bob = step ? -2 : 0
  }

}

/* WALKING UP (garden up key, or aisle runner) */

else if(
  (keys["ArrowUp"] || (touchUp && state === "garden")) ||
  (state === "altar" && rhythmState === "walking")
){
let step = Math.floor(Date.now()/160) % 2
frame = step ? lunaWalk1 : lunaWalk2
bob = step ? -2 : 0
}

/* WALKING DOWN (toward camera) */

else if(keys["ArrowDown"] || (touchDown && state === "garden")){
let step = Math.floor(Date.now()/160) % 2
frame = step ? lunaFrontWalk1 : lunaFrontWalk2
bob = step ? -2 : 0
}

/* RUNNING LEFT/RIGHT in garden (key held) */

else if(keys["ArrowLeft"] || keys["ArrowRight"] || touchLeft || touchRight){
let step = Math.floor(Date.now()/160) % 2
frame = step ? luna1 : luna2
bob = step ? -2 : 0
}

ctx.save()

ctx.translate(luna.x, luna.y + bob)
ctx.scale(luna.dir,1)

ctx.drawImage(
frame,
-50,
-65,
100,
100
)

ctx.restore()

}

function drawStart(){

if(false && startMusic.paused){  // startMusic disabled
startMusic.play().catch(()=>{})
fadeInStartMusic()
}

ctx.drawImage(
startScreen,
0,
0,
W,
H
)

// "Let's Play!" button using story button style
let bw = 220, bh = 56, bx = W/2 - bw/2, by = 617
// pill shadow
ctx.globalAlpha = 0.25
ctx.fillStyle = "#000"
ctx.beginPath()
ctx.roundRect(bx+4, by+4, bw, bh, 28)
ctx.fill()
// white background
ctx.globalAlpha = 1
ctx.fillStyle = "#fff"
ctx.beginPath()
ctx.roundRect(bx, by, bw, bh, 28)
ctx.fill()
// pill stroke
ctx.strokeStyle = "#ae84c8"
ctx.lineWidth = 3
ctx.beginPath()
ctx.roundRect(bx, by, bw, bh, 28)
ctx.stroke()
// label
ctx.fillStyle = "#ae84c8"
ctx.font = "bold 22px 'DeliusSwash', sans-serif"
ctx.textAlign = "center"
ctx.textBaseline = "middle"
ctx.fillText("Let's Play! ✦", W/2, by + bh/2)
ctx.textBaseline = "alphabetic"
}

/* ENERGY */

function updateEnergy(){

energy -= 0.005

if(energy<=0){
state="gameover"
}

}

function drawMobileControls(){

if(!isMobile) return

if(state === "altar" && rhythmState === "minigame"){
  ctx.globalAlpha = 0.7
  for(let col = 0; col < 4; col++){
    let cx = rhythmColX(col)
    drawHeart(cx, H - 50, 48, HEART_COLS[col], 0.85, HEART_COLS[col])
  }
  ctx.globalAlpha = 1
  return
}

if(state !== "garden" && state !== "coastal" && state !== "village" && state !== "altar") return

/* ── AISLE: simple L / R arrow buttons ── */
if(state === "altar" && rhythmState === "walking"){
  const aBtnR = 44, aBtnY = H - 100
  const aBtnLX = 105, aBtnRX = W - 105
  const drawABtn = (cx, cy, dir, pressed) => {
    ctx.globalAlpha = 0.2; ctx.fillStyle = "#000"
    ctx.beginPath(); ctx.arc(cx+3,cy+3,aBtnR,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha = pressed ? 0.55 : 0.35; ctx.fillStyle = "#6a3090"
    ctx.beginPath(); ctx.arc(cx,cy,aBtnR,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha = 0.7; ctx.strokeStyle = "#ae84c8"; ctx.lineWidth = 2.5

    else             { ctx.moveTo(cx+16,cy); ctx.lineTo(cx-10,cy-16); ctx.lineTo(cx-10,cy+16) }
    ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1

// on the pale aisle background, use darker tones; elsewhere use white

let jRingFill    = isAisle ? "rgba(80,50,120,0.12)"  : "rgba(255,255,255,0.08)"
let jNubFill     = isAisle ? "rgba(80,50,120,0.45)"  : "rgba(255,255,255,0.45)"
let jNubStroke   = isAisle ? "rgba(80,50,120,0.8)"   : "rgba(255,255,255,0.7)"

if(isAisle){

  grad.addColorStop(1, "rgba(0,0,0,0)")
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.arc(joystick.x, joystick.y, joystick.outerR * 2.2, 0, Math.PI * 2)

}

/* --- JOYSTICK --- */
let jx = joystick.x, jy = joystick.y
let outerR = joystick.outerR, innerR = joystick.innerR

// outer ring

ctx.arc(jx, jy, outerR, 0, Math.PI * 2)
ctx.strokeStyle = jRingStroke
ctx.lineWidth = 2
ctx.stroke()
ctx.fillStyle = jRingFill
ctx.fill()

// nub
ctx.beginPath()
ctx.arc(joystick.nubX, joystick.nubY, innerR, 0, Math.PI * 2)
ctx.fillStyle = jNubFill
ctx.fill()
ctx.strokeStyle = jNubStroke
ctx.lineWidth = 1.5
ctx.stroke()

/* --- ACTION BUTTON: heart shaped --- */
if(state !== "altar"){
let ax = actionButton.x, ay = actionButton.y, ar = actionButton.r
let s = ar * 0.68
// heart visual centre is roughly at (0, s*0.55) relative to the translate point
// translate so the heart is centred on (ax, ay)
let heartOffsetY = s * 0.55  // distance from translate origin to heart visual centre
ctx.save()
ctx.translate(ax, ay - heartOffsetY)
ctx.beginPath()
ctx.moveTo(0, s*0.3)
ctx.bezierCurveTo(-s*0.1,-s*0.1,-s,-s*0.1,-s,s*0.4)
ctx.bezierCurveTo(-s,s*0.9,0,s*1.3,0,s*1.3)
ctx.bezierCurveTo(0,s*1.3,s,s*0.9,s,s*0.4)
ctx.bezierCurveTo(s,-s*0.1,s*0.1,-s*0.1,0,s*0.3)
ctx.closePath()
ctx.fillStyle = "rgba(255,140,170,0.35)"
ctx.fill()
ctx.strokeStyle = "rgba(255,200,220,0.75)"
ctx.lineWidth = 2
ctx.stroke()
// label centred inside heart: heart spans from ~-s*0.1 (top) to s*1.3 (bottom)
// visual centre ≈ midpoint = s*0.6
ctx.fillStyle = "rgba(255,255,255,0.9)"
ctx.font = "bold 16px sans-serif"
ctx.textAlign = "center"
ctx.textBaseline = "middle"
let label = showRingPopup ? "Next" : (state === "garden" && nearDigSpot) ? "dig" : "jump"
ctx.fillText(label, 0, s * 0.6)
ctx.textBaseline = "alphabetic"
ctx.restore()
}

let bones=[]

function spawnCoastalSeagull(){
  if(seagullsCoastal.length > 0 && seagullsCoastal[seagullsCoastal.length-1].x > W - 200) return
  // pick a real surface: either ground or a visible platform
  let surfaces = [510] // ground y
  platformsCoastal.forEach(p => { if(p.x > 0 && p.x < W + 200) surfaces.push(p.y) })
  let surfaceY = surfaces[Math.floor(Math.random() * surfaces.length)]
  // seagull sprite is 80x70 — feet land ~30px below surfaceY top, so draw at surfaceY - 100
  let drawY = surfaceY - 100
  // pick an x somewhere on the right side of screen, scrolling in
  let x = W + 60 + Math.random() * 150
  seagullsCoastal.push({ x, y: drawY, surfaceY, hit: false })
}
let scroll=0

function noOverlap(x, w){
// returns true if this x position is clear of all existing platforms
return !platformsCoastal.some(p =>
x < p.x + p.w + 60 && x + w > p.x - 60
)
}

function spawnPlatformCluster(){

let last = platformsCoastal[platformsCoastal.length-1]
if(last && last.x > W) return

// three distinct height tiers
let lowTier   = [320, 340, 360]
let highTier  = [210, 230, 250, 270]
let skyTier   = [150, 165, 180]

let count = 1 + Math.floor(Math.random()*4)
let startX = W + 80
let lastTier = "low"

for(let i=0; i<count; i++){

let width = Math.random() < 0.4 ? 192 :
            Math.random() < 0.5 ? 96 : 128

// tier selection - sky only reachable from high, so sequence sensibly
let tier
let r = Math.random()
if(lastTier === "high" && r < 0.3){
tier = skyTier
lastTier = "sky"
} else if(lastTier === "sky"){
// always step back down after sky
tier = highTier
lastTier = "high"
} else if(r < 0.4){
tier = highTier
lastTier = "high"
} else {
tier = lowTier
lastTier = "low"
}

let nextY = tier[Math.floor(Math.random()*tier.length)]

// skip if this x overlaps an existing platform
if(!noOverlap(startX, width)){
startX += width + 120
continue
}

let p = { x: startX, y: nextY, w: width }
platformsCoastal.push(p)

// flower and bone on platform — vary y slightly above platform top
let hasFlower = Math.random() < 0.6
let hasBone   = Math.random() < 0.35

if(hasFlower){
flowersCoastal.push({
x: p.x + p.w * 0.25,
y: p.y - 55 + Math.floor((Math.random()-0.5) * 24)
})
}

if(hasBone){
bones.push({
x: p.x + p.w * (hasFlower ? 0.7 : 0.5),
y: p.y - 55 + Math.floor((Math.random()-0.5) * 24)
})
}

// ground-level collectibles — vary y slightly around ground height
if(Math.random() < 0.45){
flowersCoastal.push({ x: startX + Math.random() * 120, y: 455 + Math.floor((Math.random()-0.5) * 20) })
}
if(Math.random() < 0.3){
bones.push({ x: startX + Math.random() * 120, y: 455 + Math.floor((Math.random()-0.5) * 20) })
}

startX += width + 80 + Math.floor(Math.random()*80)

}

}

flowersCoastal = []
bones = []

// hand-crafted first few platforms across both tiers

luna.dir=1

platformsCoastal.forEach(p=>{

luna.y > p.y - 20 &&
luna.y < p.y + 20 &&
luna.vy >= 0
){

luna.onGround = true

}

scroll+=3

/* spawn platforms */

if(Math.random()<0.008) spawnCoastalSeagull()

/* move platforms */

platformsCoastal.forEach(p=>{
p.x-=3
})

/* move flowers */

flowersCoastal.forEach(f=>{

f.x-=3

if(Math.abs(f.x-luna.x)<20 && Math.abs(f.y-luna.y)<80){
flowers++
f.x=-100
}

})

/* move bones */

bones.forEach(b=>{

b.x-=3

if(Math.abs(b.x-luna.x)<20 && Math.abs(b.y-luna.y)<80){
energy=Math.min(100,energy+30)
bonesEaten++
b.x=-100
}

/* level end */

if(scroll > 5400 && fadeDir === 0){
fadeDir = 1
fadeTarget = "villagestory"
}

}

function spawnFlowerRow(startY){
  let lanes = [0, 1, 2].sort(() => Math.random() - 0.5)
  // block triple rows if cooldown is active
  let canTriple = tripleRowCooldown <= 0
  let count = Math.random() < 0.35 ? 1 : (canTriple && Math.random() < 0.18) ? 3 : 2
  if(count === 3) tripleRowCooldown = AISLE_FLOWER_INTERVAL * 8  // ~6 rows gap minimum

  // find lanes already occupied by nearby flowers (within 80px) to avoid withered overlapping healthy
  let nearbyLanes = new Set(
    runnerFlowers.filter(f => !f.withered && Math.abs(f.y - startY) < 80).map(f => f.lane)
  )
  // only allow withered in a lane that has no nearby healthy flower
  let witheredCandidates = lanes.slice(0, count).map((l, i) => i).filter(i => !nearbyLanes.has(lanes[i]))
  let witheredSlot = (Math.random() < 0.40 && witheredCandidates.length > 0)
    ? witheredCandidates[Math.floor(Math.random() * witheredCandidates.length)]
    : -1

  for(let i = 0; i < count; i++){
    runnerFlowers.push({
      lane: lanes[i],
      x: AISLE_LANE_XS[lanes[i]],
      y: startY,
      withered: i === witheredSlot,
      rot: (Math.random() - 0.5) * 0.35   // random tilt up to ~20 degrees either way
    })
  }
}

let rhythmFinishTimer = 0
let rhythmMissCount = 0
let rhythmAccuracyTotal = 0  // sum of accuracy bonuses (0-10 per note)
let rhythmWarmupTimer = 0
let rhythmColHeld = [false, false, false, false]
let rhythmJustPressed = [false, false, false, false]

const RHYTHM_BPM = 120
const RHYTHM_BEAT_FRAMES = 60 / RHYTHM_BPM * 60  // frames per beat at 60fps

function initRhythmGame(){
  rhythmState = "warmup"
  rhythmWarmupTimer = 0
  rhythmTimer = 0
  rhythmScore = 0
  rhythmFinishTimer = 0
  rhythmMissCount = 0
  rhythmAccuracyTotal = 0
  rhythmColHeld = [false, false, false, false]
  rhythmJustPressed = [false, false, false, false]
  // pre-warm AudioContext so first note isn't delayed
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    // play a silent buffer to unlock audio on iOS
    let buf = audioCtx.createBuffer(1, 1, 22050)
    let src = audioCtx.createBufferSource()
    src.buffer = buf
    src.connect(audioCtx.destination)
    src.start(0)
  } catch(e){}

  let travelFrames = (RHYTHM_HIT_Y + 40) / RHYTHM_FALL_SPEED
  const GAP_PX = 120  // visual gap between tail of one note and head of next
  rhythmNotes = noteChart.map((n,i) => {
    let holdPixels = Math.max(0, n.dur * RHYTHM_BEAT_FRAMES * RHYTHM_FALL_SPEED - GAP_PX)
    // each note starts at a Y position based on how far in the future it is from beat 0
    // so notes are pre-staggered visually from the first frame
    let beatsUntilHit = n.beat  // beats from game start until note reaches hit zone
    let startY = RHYTHM_HIT_Y - beatsUntilHit * RHYTHM_BEAT_FRAMES * RHYTHM_FALL_SPEED
    return {
      col: n.col,
      freq: n.freq,
      dur: n.dur,
      soundDur: n.soundDur || null,
      y: startY,
      tailY: startY - holdPixels,
      holdPixels: holdPixels,
      spawnFrame: 0,  // all spawn immediately, already positioned correctly
      spawned: true,  // pre-spawned at correct position
      hit: false,
      holding: false,
      released: false,
      missed: false,
      id: i
    }
  })
  rhythmHits = []
}

function playNote(freq, dur){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    // minimum 1.5s ring regardless of dur, so notes overlap naturally like a sustain pedal
    let secs = Math.max(1.5, (dur / RHYTHM_BPM) * 60 * 1.4)
    let now = audioCtx.currentTime

    const partials = [
      { ratio: 1,    gain: 0.5,  decay: secs * 1.0  },
      { ratio: 2,    gain: 0.25, decay: secs * 0.6  },
      { ratio: 3,    gain: 0.15, decay: secs * 0.4  },
      { ratio: 4,    gain: 0.08, decay: secs * 0.25 },
      { ratio: 5,    gain: 0.04, decay: secs * 0.15 },
    ]

    const master = audioCtx.createGain()
    master.gain.setValueAtTime(0.001, now)
    master.gain.linearRampToValueAtTime(0.35, now + 0.008)
    master.connect(audioCtx.destination)

    partials.forEach(p => {
      let osc = audioCtx.createOscillator()
      let g = audioCtx.createGain()
      osc.type = 'sine'
      osc.frequency.value = freq * p.ratio
      g.gain.setValueAtTime(p.gain, now)
      g.gain.exponentialRampToValueAtTime(0.0001, now + p.decay)
      osc.connect(g)
      g.connect(master)
      osc.start(now)
      osc.stop(now + p.decay + 0.05)
    })
  } catch(e){}
}

function checkRhythmInput(col){
  let best = null
  let bestDist = 9999
  rhythmNotes.forEach(n => {
    if(n.col === col && n.spawned && !n.hit && !n.holding && !n.missed){
      let dist = Math.abs((n.y + RHYTHM_FALL_SPEED*2) - RHYTHM_HIT_Y)
if(dist < bestDist){ bestDist = dist; best = n }
    }
  })
  if(best && bestDist < RHYTHM_HIT_WINDOW){
    // accuracy bonus: 10 points for perfect, scales down to 1 at edge of window
    let accuracy = Math.round(10 * (1 - bestDist / RHYTHM_HIT_WINDOW))
    rhythmAccuracyTotal += accuracy
    if(best.holdPixels > 0){
      best.holding = true
      playNote(best.freq, best.dur)
      rhythmScore++
      rhythmHits.push({x: rhythmColX(col), y: RHYTHM_HIT_Y, type:"hit", life:40, col:col})
    } else {
      best.hit = true
      rhythmScore++
      playNote(best.freq, best.soundDur || best.dur || 1)
      rhythmHits.push({x: rhythmColX(col), y: RHYTHM_HIT_Y, type:"hit", life:40, col:col})
    }
  }
}

function rhythmColX(col){
  return [W*0.2, W*0.4, W*0.6, W*0.8][col]

const HEART_COLS = ["#82a40d","#f098b6","#abbbf7","#f9c74f"]

function updateAltar(){

// ── RUNNER PHASE ──────────────────────────────────────────────────────────
if(rhythmState === "walking"){

  // lane switching — tap moves one lane, hold past RUNNER_HOLD_DELAY repeats
  let wantLeft  = keys["ArrowLeft"]  || touchLeft
  let wantRight = keys["ArrowRight"] || touchRight

  // track how long the current direction has been held
  let holdingDir = (wantLeft && runnerLockedDir === "left") || (wantRight && runnerLockedDir === "right")
  if(runnerInputLock && holdingDir){
    runnerHoldTimer++
    if(runnerHoldTimer >= RUNNER_HOLD_DELAY){
      // release lock so the same direction can fire again
      runnerInputLock = false
      runnerHoldTimer = 0
    }
  }

  if(!runnerInputLock){
    if(wantLeft && runnerTargetLane > 0){
      runnerTargetLane--
      runnerInputLock = true
      runnerLockedDir = "left"
      runnerHoldTimer = 0
    } else if(wantRight && runnerTargetLane < 2){
      runnerTargetLane++
      runnerInputLock = true
      runnerLockedDir = "right"
      runnerHoldTimer = 0
    }
  }
  // release lock when neutral, or when joystick crosses to the opposite direction
  if(!wantLeft && !wantRight){ runnerInputLock = false; runnerHoldTimer = 0 }
  if(runnerInputLock && runnerLockedDir === "left"  && !wantLeft){  runnerInputLock = false; runnerHoldTimer = 0 }
  if(runnerInputLock && runnerLockedDir === "right" && !wantRight){ runnerInputLock = false; runnerHoldTimer = 0 }

  // smooth lerp Luna to target lane
  let targetX = AISLE_LANE_XS[runnerTargetLane]
  runnerLaneX += (targetX - runnerLaneX) * 0.18
  luna.x = runnerLaneX
  luna.y = H - 160
  luna.dir = runnerTargetLane < runnerLane ? -1 : 1
  runnerLane = runnerTargetLane

  // advance progress
  runnerProgress = Math.min(1, runnerProgress + 1 / AISLE_DURATION)

  // dynamic speed — lerp from start to end speed as progress increases
  let currentSpeed = AISLE_SCROLL_SPEED_START + (AISLE_SCROLL_SPEED_END - AISLE_SCROLL_SPEED_START) * runnerProgress

  // scroll tiles
  runnerTileOffset += currentSpeed  // accumulate raw; draw loop applies % tileH

  // spawn flowers randomly in lanes
  runnerFlowerTimer++
  if(tripleRowCooldown > 0) tripleRowCooldown--
  if(runnerFlowerTimer >= AISLE_FLOWER_INTERVAL){
    runnerFlowerTimer = 0
    spawnFlowerRow(-30)
  }

  // move flowers down and collect
  runnerFlowers.forEach(f => {
    f.y += currentSpeed
    f.x = AISLE_LANE_XS[f.lane]
  })

  // collect/hit: luna touches any flower in her lane near her Y
  runnerFlowers = runnerFlowers.filter(f => {
    if(f.lane === runnerLane && Math.abs(f.y - luna.y) < 45){
      if(f.withered){
        // withered flower — deduct one flower, brown droopy dust
        flowers = Math.max(0, flowers - 1)
        for(let i=0;i<8;i++){
          dust.push({ x:luna.x, y:luna.y-20, vx:(Math.random()-0.5)*4, vy:-Math.random()*2, life:25 })
        }
      } else {
        // healthy tulip — add flower, pink sparkle
        flowers++
        for(let i=0;i<6;i++){
          dust.push({ x:luna.x, y:luna.y-20, vx:(Math.random()-0.5)*3, vy:-Math.random()*3-1, life:20 })
        }
      }
      return false
    }
    return f.y < H + 40
  })

  // when progress reaches 1, cut to post-runner story scene
  if(runnerProgress >= 1){
    postRunnerStorySpacePressedLastFrame = true
    storyJustEntered = true
    postRunnerTimer = 0
    state = "postrunnerstory"
  }
}

// ── RHYTHM PHASE ──────────────────────────────────────────────────────────
if(RHYTHM_GAME_ENABLED){

if(rhythmState === "warmup"){

  }

if(rhythmState === "minigame"){
  rhythmTimer++

  let heldCols = [
    keys["ArrowLeft"]  || keys["z"] || keys["Z"] || touchLeft,
    keys["ArrowUp"]    || keys["x"] || keys["X"],
    keys[" "] || keys["ArrowDown"] || keys[","],
    keys["ArrowRight"] || keys["."] || keys["/"] || touchRight
  ]
  if(isMobile) heldCols[1] = heldCols[1] || touchDig

  rhythmNotes.forEach(n => {
    if(!n.spawned) return
    if(!n.released && !n.missed){
      n.y    += RHYTHM_FALL_SPEED
      n.tailY += RHYTHM_FALL_SPEED
    }
    if(!n.hit && !n.holding && !n.missed && n.y > RHYTHM_HIT_Y + RHYTHM_HIT_WINDOW * 1.5){
      n.missed = true
      rhythmMissCount++
      rhythmHits.push({x: rhythmColX(n.col), y: RHYTHM_HIT_Y, type:"miss", life:30, col:n.col})
      if(rhythmMissCount >= 6){ rhythmState = "failed" }
    }
    if(n.holding && !n.released){
      if(!heldCols[n.col]){ n.released = true; n.hit = true }
      if(n.tailY >= RHYTHM_HIT_Y - RHYTHM_HIT_WINDOW){
        n.released = true; n.hit = true
        rhythmHits.push({x: rhythmColX(n.col), y: RHYTHM_HIT_Y, type:"hit", life:40, col:n.col})
      }
    }
  })

  rhythmHits.forEach(h => h.life--)
  rhythmHits = rhythmHits.filter(h => h.life > 0)

  let allDone = rhythmNotes.every(n => n.hit || n.missed)
  if(allDone){
    rhythmFinishTimer++
    if(rhythmFinishTimer > 60){
      rhythmState = "done"
      spawnConfetti()
      state = "win"
    }
  }
}

} // end RHYTHM_GAME_ENABLED

}

function drawHeart(x, y, size, color, alpha, glowColor){
  ctx.save()
  ctx.globalAlpha = alpha
  if(glowColor){
    ctx.shadowColor = glowColor
    ctx.shadowBlur = 18
  }
  ctx.fillStyle = color
  ctx.strokeStyle = "white"
  ctx.lineWidth = 3
  ctx.beginPath()
  let s = size / 2
  ctx.moveTo(x, y + s * 0.3)
  ctx.bezierCurveTo(x, y - s * 0.5, x - s, y - s * 0.5, x - s, y)
  ctx.bezierCurveTo(x - s, y + s * 0.5, x, y + s * 0.9, x, y + s * 0.9)
  ctx.bezierCurveTo(x, y + s * 0.9, x + s, y + s * 0.5, x + s, y)
  ctx.bezierCurveTo(x + s, y - s * 0.5, x, y - s * 0.5, x, y + s * 0.3)
  ctx.closePath()
  ctx.fill()
  ctx.stroke()
  ctx.restore()
}

function drawAltar(){

// ── RHYTHM FAIL SCREEN ────────────────────────────────────────────────────
if(RHYTHM_GAME_ENABLED && rhythmState === "failed"){
  ctx.fillStyle = "#1a1a2e"
  ctx.fillRect(0, 0, W, H)
  ctx.textAlign = "center"
  ctx.fillStyle = "#ff6b6b"
  ctx.font = "bold 26px 'DeliusSwash', sans-serif"
  ctx.fillText("Oh no! 💔", W/2, 220)
  ctx.fillStyle = "white"
  ctx.font = "16px 'DeliusSwash', sans-serif"
  ctx.fillText("Luna dropped the rings!", W/2, 270)
  ctx.fillText("Too many notes missed...", W/2, 300)
  ctx.font = "13px 'DeliusSwash', sans-serif"
  ctx.fillStyle = "#aaa"
  ctx.fillText("flowers & bones kept 🌷🦴", W/2, 340)
  ctx.fillStyle = "#e05cb0"
  ctx.beginPath()
  ctx.roundRect(W/2-100, 380, 200, 50, 25)
  ctx.fill()
  ctx.fillStyle = "white"
  ctx.font = "bold 16px 'DeliusSwash', sans-serif"
  ctx.fillText("Try again 🎵", W/2, 411)
  return
}

// ── AISLE RUNNER ─────────────────────────────────────────────────────────
if(rhythmState === "walking"){

  // --- BACKGROUND ---
  ctx.fillStyle = "#f5ede0"
  ctx.fillRect(0, UI_H, W, H - UI_H)

  // --- SCROLLING AISLE ---
  if(aisleTile.complete && aisleTile.naturalWidth > 0){
    let tileH = aisleTile.naturalHeight
    let numTiles = Math.ceil(H / tileH) + 2
    ctx.save()
    ctx.beginPath()
    ctx.rect(0, UI_H, W, H - UI_H)
    ctx.clip()
    for(let i = 0; i < numTiles; i++){
      let ty = (runnerTileOffset % tileH) - tileH + i * tileH
      ctx.drawImage(aisleTile, 0, ty, W, tileH)
    }
    ctx.restore()
  } else {
    // Programmatic aisle:
    // Layout (left→right):  pew(15%) | stone(10%) | carpet(50%) | stone(10%) | pew(15%)
    const PEW_W   = W * 0.15
    const STONE_W = W * 0.05
    const CARPET_X = PEW_W + STONE_W          // = W*0.20
    const CARPET_W = W * 0.60
    const ROW_H = 100   // height of one pew row tile

    let numRows = Math.ceil(H / ROW_H) + 2

    // draw static stone floor first (full height, won't scroll)
    ctx.fillStyle = "#b8a898"
    ctx.fillRect(PEW_W, 0, STONE_W, H)           // left stone
    ctx.fillRect(PEW_W + STONE_W + CARPET_W, 0, STONE_W, H)  // right stone

    // stone tile grid lines (static — gives texture without scrolling)
    ctx.strokeStyle = "rgba(90,70,60,0.18)"
    ctx.lineWidth = 1
    let stoneGridH = 40
    let stoneGridW = STONE_W / 2
    for(let col = 0; col < 2; col++){
      let sx = PEW_W + col * stoneGridW
      for(let row = 0; row < Math.ceil(H/stoneGridH)+1; row++){
        let sy = (runnerTileOffset % stoneGridH) - stoneGridH + row * stoneGridH
        ctx.strokeRect(sx + 1, sy + 1, stoneGridW - 2, stoneGridH - 2)
      }
    }
    for(let col = 0; col < 2; col++){
      let sx = CARPET_X + CARPET_W + col * stoneGridW
      for(let row = 0; row < Math.ceil(H/stoneGridH)+1; row++){
        let sy = (runnerTileOffset % stoneGridH) - stoneGridH + row * stoneGridH
        ctx.strokeRect(sx + 1, sy + 1, stoneGridW - 2, stoneGridH - 2)
      }
    }

    // scrolling pew rows
    for(let i = 0; i < numRows; i++){
      let ty = (runnerTileOffset % ROW_H) - ROW_H + i * ROW_H

      // left pew body
      ctx.fillStyle = "#c8a97a"
      ctx.fillRect(0, ty + 4, PEW_W - 2, ROW_H - 10)
      // left pew end cap (dark edge at bottom of each pew)
      ctx.fillStyle = "#8b6430"
      ctx.fillRect(0, ty + ROW_H - 10, PEW_W - 2, 8)
      // left pew inner edge shadow
      ctx.fillStyle = "rgba(0,0,0,0.12)"
      ctx.fillRect(PEW_W - 4, ty + 4, 4, ROW_H - 10)

      // right pew body (mirror)
      ctx.fillStyle = "#c8a97a"
      ctx.fillRect(W - PEW_W + 2, ty + 4, PEW_W - 2, ROW_H - 10)
      ctx.fillStyle = "#8b6430"
      ctx.fillRect(W - PEW_W + 2, ty + ROW_H - 10, PEW_W - 2, 8)
      ctx.fillStyle = "rgba(0,0,0,0.12)"
      ctx.fillRect(W - PEW_W + 2, ty + 4, 4, ROW_H - 10)

      // occasional flowers at pew ends — programmatic placeholder
      let rowIndex = i + Math.floor(runnerTileOffset / ROW_H)
      if(rowIndex % 3 === 0){
        // left pew end flower
        let fx = PEW_W - 4, fy = ty + ROW_H - 22
        ctx.save()
        // stem
        ctx.strokeStyle = "#4a7a30"; ctx.lineWidth = 2
        ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 18); ctx.stroke()
        // petals
        for(let p = 0; p < 5; p++){
          let angle = (p / 5) * Math.PI * 2
          ctx.fillStyle = p % 2 === 0 ? "#f098b6" : "#f9c74f"
          ctx.beginPath()
          ctx.ellipse(fx + Math.cos(angle)*5, fy - 18 + Math.sin(angle)*5, 4, 3, angle, 0, Math.PI*2)
          ctx.fill()
        }
        // centre
        ctx.fillStyle = "#fff176"
        ctx.beginPath(); ctx.arc(fx, fy - 18, 3, 0, Math.PI*2); ctx.fill()
        ctx.restore()
      }
      if(rowIndex % 3 === 1){
        // right pew end flower
        let fx = W - PEW_W + 4, fy = ty + ROW_H - 22
        ctx.save()
        ctx.strokeStyle = "#4a7a30"; ctx.lineWidth = 2
        ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 18); ctx.stroke()
        for(let p = 0; p < 5; p++){
          let angle = (p / 5) * Math.PI * 2
          ctx.fillStyle = p % 2 === 0 ? "#abbbf7" : "#f9c74f"
          ctx.beginPath()
          ctx.ellipse(fx + Math.cos(angle)*5, fy - 18 + Math.sin(angle)*5, 4, 3, angle, 0, Math.PI*2)
          ctx.fill()
        }
        ctx.fillStyle = "#fff176"
        ctx.beginPath(); ctx.arc(fx, fy - 18, 3, 0, Math.PI*2); ctx.fill()
        ctx.restore()
      }
    }

    // carpet (drawn on top so pew/stone layers are behind it)
    ctx.fillStyle = "#8b0000"
    ctx.fillRect(CARPET_X, 0, CARPET_W, H)

    // carpet seam lines (scroll with tiles)
    let numSeams = Math.ceil(H / ROW_H) + 2
    for(let i = 0; i < numSeams; i++){
      let ty = (runnerTileOffset % ROW_H) - ROW_H + i * ROW_H
      ctx.strokeStyle = "rgba(60,0,0,0.35)"
      ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(CARPET_X, ty); ctx.lineTo(CARPET_X + CARPET_W, ty); ctx.stroke()
    }

    // gold trim edges on carpet
    ctx.fillStyle = "#d4a017"
    ctx.fillRect(CARPET_X, 0, 4, H)
    ctx.fillRect(CARPET_X + CARPET_W - 4, 0, 4, H)
  }

  // --- FLOWERS (tulips) + WITHERED FLOWER OBSTACLES ---
  runnerFlowers.forEach(f => {
    if(!f.withered){
      ctx.save()
      ctx.translate(f.x, f.y)
      ctx.rotate(f.rot || 0)
      ctx.drawImage(tulip, -28, -35, 56, 70)
      ctx.restore()
    } else {
      ctx.save()
      ctx.translate(f.x, f.y)
      ctx.rotate(f.rot || 0)
      ctx.drawImage(witheredTulip, -28, -35, 56, 70)
      ctx.restore()
    }
  })

  // --- LUNA running animation (walk-toward-camera frames) ---
  let bob = Math.floor(Date.now() / 120) % 2 === 0 ? -3 : 0
  let runFrame = Math.floor(Date.now() / 160) % 2 === 0 ? lunaWalk1 : lunaWalk2
  ctx.save()
  ctx.translate(luna.x, luna.y + bob)
  ctx.scale(luna.dir, 1)
  ctx.drawImage(runFrame, -50, -65, 100, 100)
  ctx.restore()

  return
}

// ── WARMUP SCREEN ─────────────────────────────────────────────────────────
if(RHYTHM_GAME_ENABLED && rhythmState === "warmup"){
  ctx.drawImage(loadingScreen, 0, 0, W, H)
  let dots = Math.floor(rhythmWarmupTimer / 22) + 1
  ctx.fillStyle = "white"
  ctx.font = "22px 'DeliusSwash', sans-serif"
  ctx.textAlign = "center"
  ctx.fillText("Get ready" + ".".repeat(Math.min(dots, 3)), W/2, H/2 + 20)
  let progress = rhythmWarmupTimer / 90
  let barW = 200, barH = 18, barX = W/2 - 100, barY = H/2 + 60, pad = 4, r = barH/2
  ctx.fillStyle = "white"
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, r); ctx.fill()
  let fillW = Math.max(0, (barW - pad*2) * progress)
  if(fillW > 0){
    ctx.fillStyle = "#f19ab4"
    ctx.beginPath(); ctx.roundRect(barX+pad, barY+pad, fillW, barH-pad*2, r-pad); ctx.fill()
  }
  return
}

// ── RHYTHM MINI GAME ──────────────────────────────────────────────────────

ctx.fillStyle = "#1a0a2e"
ctx.fillRect(0, 0, W, H)

let aisleGrad = ctx.createLinearGradient(W/2 - 80, 0, W/2 + 80, 0)
aisleGrad.addColorStop(0, "rgba(255,220,240,0)")
aisleGrad.addColorStop(0.5, "rgba(255,220,240,0.08)")
aisleGrad.addColorStop(1, "rgba(255,220,240,0)")
ctx.fillStyle = aisleGrad
ctx.fillRect(0, 0, W, H)

ctx.fillStyle = "white"
ctx.font = "20px 'DeliusSwash', sans-serif"
ctx.textAlign = "center"
ctx.fillText("🎵 Here Comes the Bride! 🎵", W/2, 50)

ctx.font = "15px 'DeliusSwash', sans-serif"
ctx.fillStyle = "#f098b6"
ctx.fillText(rhythmScore + " / " + rhythmTotal, W/2, 78)

for(let col = 0; col < 4; col++){
  let cx = rhythmColX(col)
  ctx.strokeStyle = "rgba(255,255,255,0.06)"
  ctx.lineWidth = 80
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke()
}

for(let col = 0; col < 4; col++){
  drawHeart(rhythmColX(col), RHYTHM_HIT_Y, 36, HEART_COLS[col], 0.35, null)
}

rhythmNotes.forEach(n => {
  if(!n.spawned) return
  if((n.hit && n.released) || n.missed) return
  if(n.y < -80) return

  let cx = rhythmColX(n.col)
  let color = HEART_COLS[n.col]
  let isHolding = n.holding && !n.released
  let headSize = 36, tailSize = 26

  if(n.holdPixels > 20){
    let lineTop = Math.max(n.tailY, 90)
    let lineBot = Math.min(n.y, RHYTHM_HIT_Y + 20)
    if(lineBot > lineTop){
      ctx.save()
      let grad = ctx.createLinearGradient(cx, lineBot, cx, lineTop)
      grad.addColorStop(0, color); grad.addColorStop(0.7, color); grad.addColorStop(1, "rgba(0,0,0,0)")
      ctx.strokeStyle = grad; ctx.lineWidth = 14; ctx.lineCap = "round"
      ctx.globalAlpha = isHolding ? 1 : 0.85
      ctx.shadowColor = color; ctx.shadowBlur = 8
      ctx.beginPath(); ctx.moveTo(cx, lineTop); ctx.lineTo(cx, lineBot); ctx.stroke()
      let gradW = ctx.createLinearGradient(cx, lineBot, cx, lineTop)
      gradW.addColorStop(0, "rgba(255,255,255,0.35)"); gradW.addColorStop(0.7, "rgba(255,255,255,0.2)"); gradW.addColorStop(1, "rgba(255,255,255,0)")
      ctx.strokeStyle = gradW; ctx.lineWidth = 5; ctx.shadowBlur = 0
      ctx.beginPath(); ctx.moveTo(cx, lineTop); ctx.lineTo(cx, lineBot); ctx.stroke()
      ctx.restore()
    }
    if(n.tailY > 90 && n.tailY < H) drawHeart(cx, n.tailY, tailSize, color, isHolding ? 1 : 0.7, color)
    if(!n.holding){
      let scale = 0.85 + (n.y / RHYTHM_HIT_Y) * 0.25
      drawHeart(cx, n.y, headSize * scale, color, 1, color)
    } else {
      let pulse = 0.8 + 0.2 * Math.sin(rhythmTimer * 0.3)
      drawHeart(cx, RHYTHM_HIT_Y, headSize, color, pulse, color)
    }
  } else {
    drawHeart(cx, n.y, headSize, color, 1, color)
  }
})

rhythmHits.forEach(h => {
  let frac = h.life / (h.type === "hit" ? 40 : 30)
  if(h.type === "hit"){
    ctx.save()
    ctx.globalAlpha = frac * 0.9
    ctx.strokeStyle = HEART_COLS[h.col]; ctx.shadowColor = HEART_COLS[h.col]; ctx.shadowBlur = 20; ctx.lineWidth = 3
    let r = 28 + (1 - frac) * 30
    ctx.beginPath(); ctx.arc(h.x, h.y, r, 0, Math.PI*2); ctx.stroke()
    ctx.restore()
    for(let i = 0; i < 6; i++){
      let angle = (i/6)*Math.PI*2 + (1-frac)*3
      let dist = 20 + (1-frac)*25
      ctx.save(); ctx.globalAlpha = frac
      ctx.fillStyle = HEART_COLS[h.col]; ctx.shadowColor = HEART_COLS[h.col]; ctx.shadowBlur = 8
      ctx.beginPath(); ctx.arc(h.x+Math.cos(angle)*dist, h.y+Math.sin(angle)*dist, 3, 0, Math.PI*2); ctx.fill()
      ctx.restore()
    }
    drawHeart(h.x, h.y, 44+(1-frac)*16, HEART_COLS[h.col], frac*0.8, HEART_COLS[h.col])
  } else {
    drawHeart(h.x, h.y, 44, "#ff3333", frac * 0.85)
  }
})

ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 1.5
ctx.setLineDash([6,6])
ctx.beginPath(); ctx.moveTo(W/2-120, RHYTHM_HIT_Y); ctx.lineTo(W/2+120, RHYTHM_HIT_Y); ctx.stroke()
ctx.setLineDash([])

let allDone = rhythmNotes.every(n => n.hit || n.missed)
if(allDone && rhythmFinishTimer > 0){
  ctx.fillStyle = "white"; ctx.font = "22px 'DeliusSwash', sans-serif"; ctx.textAlign = "center"
  let msg = rhythmScore === rhythmTotal ? "Perfect! 💍" : rhythmScore > rhythmTotal * 0.6 ? "Beautiful! 💍" : "The rings are delivered! 💍"
  ctx.fillText(msg, W/2, H/2)
}

}

  ctx.stroke()
  // label
  ctx.fillStyle = "#ae84c8"
  ctx.font = "bold 22px 'DeliusSwash', sans-serif"
  ctx.textAlign = "center"
  ctx.textBaseline = "middle"
  ctx.fillText("Tap to continue ✦", W/2, by + bh/2)
  ctx.textBaseline = "alphabetic"
}

function drawGardenStory(){
ctx.drawImage(gardenStoryImg, 0, 0, W, H)
if(!storyJustEntered) drawStoryContinueButton()
}

state = "coastal"

scroll = 0
platformsCoastal = []
flowersCoastal = []

seagullsCoastal = []

function updateVillageStory(){

storyJustEntered = false

if((keys[" "] || touchJump || touchDig) && !villageStorySpacePressedLastFrame){

scroll = 0
obstacles = []
bonesVillage = []
flowersVillage = []
luna.x = 100

}

function updateAltarStory(){

storyJustEntered = false

if((keys[" "] || touchJump || touchDig) && !altarStorySpacePressedLastFrame){

// initialise runner on entry from story
runnerLane = 1; runnerTargetLane = 1; runnerLaneX = W*0.5
runnerProgress = 0; runnerTileOffset = 0; initRunnerFlowers()
luna.x = W * 0.5; luna.y = H - 160
}

}

function updatePostRunnerStory(){
  storyJustEntered = false
  postRunnerTimer++

  // Scene timeline (frames at 60fps):
  // 0–90   Luna walks toward couple
  // 90–150 Ring box flies from Luna to couple
  // 150–330 Couple + Luna celebrate
  // 330–390 Confetti bursts from sides
  // 390+   Confetti rains, then auto-transition to win at 480

  // Tulip confetti bursts from both sides AND top starting at frame 330
  if(postRunnerTimer >= 330 && postRunnerTimer < 420){
    if(postRunnerTimer % 4 === 0){
      // left side burst
      for(let i=0;i<4;i++){
        confetti.push({ x:0, y:H*0.3+Math.random()*H*0.4, vx:Math.random()*5+2, vy:(Math.random()-0.5)*5, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2, isTulip:true })
      }
      // right side burst
      for(let i=0;i<4;i++){
        confetti.push({ x:W, y:H*0.3+Math.random()*H*0.4, vx:-(Math.random()*5+2), vy:(Math.random()-0.5)*5, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2, isTulip:true })
      }
      // top burst
      for(let i=0;i<4;i++){
        confetti.push({ x:Math.random()*W, y:0, vx:(Math.random()-0.5)*5, vy:Math.random()*4+2, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2, isTulip:true })
      }
    }
  }

  // tick confetti physics
  confetti.forEach(c => {
    c.x += c.vx; c.y += c.vy; c.vy += 0.08
    if(c.isTulip) c.rot += c.rotV
  })

  // auto-transition to win
  if(postRunnerTimer >= 480){
    // seed win screen with tulip confetti from sides AND top
    for(let i=0;i<60;i++){
      let side = i < 30 ? 0 : W
      confetti.push({ x:side, y:H*0.1+Math.random()*H*0.5, vx:(side===0?1:-1)*(Math.random()*5+2), vy:(Math.random()-0.6)*5, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2, isTulip:true })
    }
    // top rain
    for(let i=0;i<30;i++){
      confetti.push({ x:Math.random()*W, y:0, vx:(Math.random()-0.5)*4, vy:Math.random()*4+1, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2, isTulip:true })
    }
    state = "win"
  }
}

function drawPostRunnerStory(){
  // ── BACKGROUND ──
  ctx.drawImage(ringStoryImg, 0, 0, W, H)

  // ── SCENE PHASES ──
  const WALK_END    = 90    // luna arrives
  const RING_END    = 150   // ring reaches couple
  const CELEB_START = 150
  const CONFETTI_START = 330

  // Layout constants derived from mockup (canvas 420×700):
  // Mockup shows couple at ~130px wide × 165px tall, feet at ~y530
  // Jonny  centre-x ≈ 168, Lottie centre-x ≈ 258  (side-by-side with small gap)
  const COUPLE_W = 130, COUPLE_H = 165          // sprite draw size — natural aspect ratio
  const COUPLE_FEET_Y = 525                      // y where feet touch ground
  const JONNY_CX  = 168                          // Jonny  centre-x
  const LOTTIE_CX = 262                          // Lottie centre-x
  const LUNA_REST_X = 130, LUNA_REST_Y = 580     // Luna arrived position (feet)
  const LUNA_W = 90,  LUNA_H = 90               // Luna sprite draw size

  // --- COUPLE ---
  let coupleFrame
  if(postRunnerTimer < CELEB_START){
    coupleFrame = [jonny1, lottie1]
  } else {
    // 3-frame jump cycle: stand → jump peak → land
    let celebFrame = Math.floor(postRunnerTimer / 8) % 3
    let jonnyFrames  = [jonny1, jonnyJump1, jonny1]
    let lottieFrames = [lottie1, lottieJump1, lottie1]
    // jump sprites show character airborne — shift up extra on peak frame
    let jumpY = celebFrame === 1 ? -30 : celebFrame === 0 ? -10 : 0
    ctx.drawImage(jonnyFrames[celebFrame],
      JONNY_CX  - COUPLE_W/2, COUPLE_FEET_Y - COUPLE_H + jumpY, COUPLE_W, COUPLE_H)
    ctx.drawImage(lottieFrames[celebFrame],
      LOTTIE_CX - COUPLE_W/2, COUPLE_FEET_Y - COUPLE_H + jumpY, COUPLE_W, COUPLE_H)
    coupleFrame = null
  }
  if(coupleFrame){
    ctx.drawImage(coupleFrame[0], JONNY_CX  - COUPLE_W/2, COUPLE_FEET_Y - COUPLE_H, COUPLE_W, COUPLE_H)
    ctx.drawImage(coupleFrame[1], LOTTIE_CX - COUPLE_W/2, COUPLE_FEET_Y - COUPLE_H, COUPLE_W, COUPLE_H)
  }

  // --- RING BOX ---
  // flies from Luna's rest position up to between the couple
  if(postRunnerTimer >= WALK_END){
    let ringT = Math.min(1, (postRunnerTimer - WALK_END) / (RING_END - WALK_END))
    ringT = 1 - Math.pow(1 - ringT, 3)   // ease out
    let startX = LUNA_REST_X, startY = LUNA_REST_Y - 30
    let endX = W/2, endY = COUPLE_FEET_Y - COUPLE_H * 0.6
    let ringX = startX + (endX - startX) * ringT
    let ringY = startY + (endY - startY) * ringT - Math.sin(ringT * Math.PI) * 80
    let ringScale = 0.7 + ringT * 0.5
    ctx.save()
    ctx.translate(ringX, ringY)
    ctx.scale(ringScale, ringScale)
    ctx.drawImage(ringbox, -18, -18, 36, 36)
    ctx.restore()
  }

  // --- LUNA ---
  // Walks in from bottom-centre, arrives at bottom-left resting spot
  const LUNA_START_X = W/2, LUNA_START_Y = H + 60   // off-screen bottom
  let lunaX, lunaY, lunaDir

  if(postRunnerTimer < WALK_END){
    let t = postRunnerTimer / WALK_END
    // ease in-out
    let et = t < 0.5 ? 2*t*t : -1+(4-2*t)*t
    lunaX = LUNA_START_X + (LUNA_REST_X - LUNA_START_X) * et
    lunaY = LUNA_START_Y + (LUNA_REST_Y - LUNA_START_Y) * et
    lunaDir = LUNA_REST_X < LUNA_START_X ? -1 : 1
    let walkStep = Math.floor(Date.now() / 160) % 2
    let walkFrame = walkStep ? lunaWalk1 : lunaWalk2
    let bob = walkStep ? -3 : 0
    ctx.save()
    ctx.translate(lunaX, lunaY + bob)
    ctx.scale(lunaDir, 1)
    ctx.drawImage(walkFrame, -LUNA_W/2, -LUNA_H, LUNA_W, LUNA_H)
    ctx.restore()
  } else if(postRunnerTimer < CELEB_START){
    ctx.drawImage(luna1, LUNA_REST_X - LUNA_W/2, LUNA_REST_Y - LUNA_H, LUNA_W, LUNA_H)
  } else {
    // happy bounce in place
    let df = Math.floor(postRunnerTimer / 10) % 3
    let danceY = df === 1 ? -12 : df === 0 ? -5 : 0
    ctx.drawImage(luna1, LUNA_REST_X - LUNA_W/2, LUNA_REST_Y - LUNA_H + danceY, LUNA_W, LUNA_H)
  }

  // --- TULIP CONFETTI ---
  confetti.forEach(c => {
    if(!c.isTulip) return
    ctx.save()
    ctx.translate(c.x, c.y)
    ctx.rotate(c.rot)
    ctx.drawImage(tulip, -10, -13, 20, 26)
    ctx.restore()
  })
}

function drawControls(){

ctx.drawImage(controlsScreen, 0, 0, W, H)

// "Tap to Continue" button using story button style
let bw = 220, bh = 56, bx = W/2 - bw/2, by = H - 175
ctx.globalAlpha = 0.25
ctx.fillStyle = "#000"
ctx.beginPath()
ctx.roundRect(bx+4, by+4, bw, bh, 28)
ctx.fill()
ctx.globalAlpha = 1
ctx.fillStyle = "#fff"
ctx.beginPath()
ctx.roundRect(bx, by, bw, bh, 28)
ctx.fill()
ctx.strokeStyle = "#ae84c8"
ctx.lineWidth = 3
ctx.beginPath()
ctx.roundRect(bx, by, bw, bh, 28)
ctx.stroke()
ctx.fillStyle = "#ae84c8"
ctx.font = "bold 22px 'DeliusSwash', sans-serif"
ctx.textAlign = "center"
ctx.textBaseline = "middle"
ctx.fillText("Tap to Continue ✦", W/2, by + bh/2)
ctx.textBaseline = "alphabetic"

}

function restartGame(){
energy = 100
flowers = 0
bonesEaten = 0
hasRing = false
showRingPopup = false
ringAnimTimer = 0
ringAnimSpot = null
popupFadeTimer = 0
confetti = []
postRunnerTimer = 0
dust = []
scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
obstacles = []
bonesVillage = []
flowersVillage = []
luna.x = 200
luna.y = 500
luna.vx = 0
luna.vy = 0
fadeAlpha = 0
fadeDir = 0
fadeTarget = ""
rhythmState = "walking"
rhythmTimer = 0
rhythmWarmupTimer = 0
rhythmColHeld = [false, false, false, false]
rhythmNotes = []
rhythmHits = []
rhythmScore = 0
rhythmFinishTimer = 0
rhythmMissCount = 0
rhythmAccuracyTotal = 0
// reset runner
runnerLane = 1
runnerTargetLane = 1
runnerLaneX = W * 0.5
runnerProgress = 0
runnerTileOffset = 0
initRunnerFlowers()
runnerInputLock = false
runnerHoldTimer = 0
state = "garden"
generateDigSpots()
digTimer = 0
}

function updateFade(){

if(fadeDir === 1){
// fading out to black
fadeAlpha += 0.04
if(fadeAlpha >= 1){
fadeAlpha = 1
// switch state and start fading back in
state = fadeTarget
storyJustEntered = true
if(fadeTarget === "gardenstory")  gardenStorySpacePressedLastFrame  = true
if(fadeTarget === "coastalstory") coastalStorySpacePressedLastFrame = true
if(fadeTarget === "villagestory") villageStorySpacePressedLastFrame = true
if(fadeTarget === "altarstory")   altarStorySpacePressedLastFrame   = true
fadeDir = -1
fadeTarget = ""
}
} else if(fadeDir === -1){
// fading back in
fadeAlpha -= 0.04
if(fadeAlpha <= 0){
fadeAlpha = 0
fadeDir = 0
}
}

}

function drawFade(){
if(fadeAlpha <= 0) return
ctx.fillStyle = "rgba(0,0,0," + fadeAlpha + ")"
ctx.fillRect(0, 0, W, H)
}



function update(){

if(state==="controls") updateControls()
if(state==="gardenstory") updateGardenStory()
if(state==="garden") updateGarden()
if(state==="coastalstory") updateCoastalStory()
if(state==="coastal") updateCoastal()
if(state==="villagestory") updateVillageStory()
if(state==="village") updateVillage()
if(state==="altarstory") updateAltarStory()
if(state==="postrunnerstory") updatePostRunnerStory()
if(state==="altar") updateAltar()

updateFade()

if(digTimer > 0){
digTimer--
}

if(landTimer > 0){
landTimer--
}

dust.forEach(d=>{
d.x += d.vx
d.y += d.vy
d.life--
})

dust = dust.filter(d=>d.life>0)

}

function draw(){

if(state==="start"){
drawStart()
return
}

if(state==="controls"){
drawControls()
return
}

if(state==="gardenstory"){
drawGardenStory()
return
}

if(state==="coastalstory"){
drawCoastalStory()
return
}

if(state==="villagestory"){
drawVillageStory()
return
}

if(state==="altarstory"){
drawAltarStory()
return
}

if(state==="postrunnerstory"){
drawPostRunnerStory()
return
}

if(state==="win"){
drawWin()
return
}

if(state==="gameover"){
drawGameOver()
return
}

if(state==="garden") drawGarden()
if(state==="coastal") drawCoastal()
if(state==="village") drawVillage()
if(state==="altar") drawAltar()

drawFade()

if(
state === "garden" ||
state === "coastal" ||
state === "village" ||
(state === "altar" && rhythmState !== "failed")
){
drawUI()
}
}

function drawLoading(){

// loading screen image fills canvas
if(loadingScreen.complete && loadingScreen.naturalWidth > 0){
ctx.drawImage(loadingScreen, 0, 0, W, H)
} else {
ctx.fillStyle = "#fff0f6"
ctx.fillRect(0, 0, W, H)
}

let progress = totalImages > 0 ? loadedCount / totalImages : 0

// bar dimensions
let barW = 260
let barH = 22
let barX = W/2 - barW/2
let barY = H - 100
let radius = barH / 2
let pad = 4  // white gap between outline and fill

// white rounded background (the "frame")
ctx.fillStyle = "white"
ctx.beginPath()
ctx.roundRect(barX, barY, barW, barH, radius)
ctx.fill()

// pink fill inset by pad
let fillW = Math.max(0, (barW - pad*2) * progress)
if(fillW > 0){
ctx.fillStyle = "#f19ab4"
ctx.beginPath()
ctx.roundRect(barX + pad, barY + pad, fillW, barH - pad*2, radius - pad)
ctx.fill()
}

}

function loop(){

if(!allImagesLoaded){
drawLoading()
requestAnimationFrame(loop)
return
}

update()
draw()

requestAnimationFrame(loop)

}

document.fonts.ready.then(() => { loop() })

</script>
