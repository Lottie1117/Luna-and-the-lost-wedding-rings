<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Luna and The Lost Wedding Rings</title>

<style>
body{
margin:0;
background:#1a1a2e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
color:white;
overflow:hidden;
}

canvas{
background:#87ceeb;
border-radius:12px;

/* responsive scaling */
width:95vw;
max-width:900px;
height:auto;
}
</style>


</head>

<body>

<canvas id="game" width="420" height="700"></canvas>

<script>

const startScreen = new Image()
startScreen.src = "startscreen.png"

const villageTiles = new Image()
villageTiles.src = "village_tiles.png"

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const W = canvas.width	
const H = canvas.height

const isMobile = "ontouchstart" in window


const sprites = new Image()
sprites.src = "sprites.png"

const tileset = new Image()
tileset.src = "tileset.png"

const grasstile = new Image()
grasstile.src = "grasstile.png"

const dughole = new Image()
dughole.src = "dughole.png"

const flowergrass = new Image()
flowergrass.src = "flowergrass.png"

let ringbox = new Image()
ringbox.src = "ringbox.png"

const tulip = new Image()
tulip.src = "tulip.png"

const gravybone = new Image()
gravybone.src = "gravybone.png"

const sea = new Image()
sea.src = "sea.png"

const luna1 = new Image()
luna1.src = "luna1.png"

const luna2 = new Image()
luna2.src = "luna2.png"

const lunaDig = new Image()
lunaDig.src = "lunadig.png"

const whiteflower = new Image()
whiteflower.src = "whiteflower.png"

const purplegrass = new Image()
purplegrass.src = "purplegrass.png"

const houseRow = new Image()
houseRow.src = "house-row.png"

const path = new Image()
path.src = "path.png"

const sandpath = new Image()
sandpath.src = "sandpath.png"

const jonny1 = new Image()
jonny1.src = "jonny1.png"

const bggrass = new Image()
bggrass.src = "bggrass.png"

const lottie1 = new Image()
lottie1.src = "lottie1.png"

const flowerpot = new Image()
flowerpot.src = "flowerpot.png"

const crate = new Image()
crate.src = "crate.png"

const wall = new Image()
wall.src = "wall.png"

const seagull = new Image()
seagull.src = "seagull.png"

const bgpath = new Image()
bgpath.src = "bgpath.png"

const house1 = new Image()
house1.src = "house1.png"

const house2 = new Image()
house2.src = "house2.png"

const house3 = new Image()
house3.src = "house3.png"

const house4 = new Image()
house4.src = "house4.png"

const btnLeft = new Image()
btnLeft.src = "buttonleft.png"

const btnRight = new Image()
btnRight.src = "buttonright.png"

const btnJump = new Image()
btnJump.src = "buttonupjump.png"

const btnDig = new Image()
btnDig.src = "buttondig.png"

const houses = [house1, house2, house3, house4]

let grassplatform = new Image()
grassplatform.src = "grassplatform.png"

const doublegrassplatform = new Image()
doublegrassplatform.src = "doublegrassplatform.png"

let dust = []

let meadowFlowers=[]

let state = "start"

let confetti = []

let showRingPopup = false
let ringAnimTimer = 0
let ringAnimSpot = null
let popupFadeTimer = 0

let spacePressedLastFrame = false

let previousState = "start"

let digTimer = 0
let nearDigSpot = false

let touchLeft = false
let touchRight = false
let touchJump = false
let touchDig = false
let touchDigFired = false

let touchUp = false
let touchDown = false

const mobileControls = {
size: 80,
left: {x: W/2 - 100, y: H - 90},
center: {x: W/2, y: H - 90},
right: {x: W/2 + 100, y: H - 90}
}

const gardenControls = {
up: {x: W/2, y: H - 160},
down: {x: W/2, y: H - 20}
}

const startButton = {
x: W/2 - 130,
y: 617,
w: 260,
h: 60
}


/* PLAYER */

const luna = {
x:200,
y:500,
vx:0,
vy:0,
ground:false,
dir:1
}

const couple = {
x: W/2,
y: 220
}

/* UI */

let energy=100
let hasRing=false
let flowers=0

/* INPUT */

const keys = {}

window.addEventListener("keydown", e => {

keys[e.key] = true

/* DEV LEVEL SKIP */

if(e.key === "1"){
state = "garden"
generateDigSpots()
}

if(e.key === "2"){
state = "coastal"
luna.x = 50
luna.y = 500
scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
initCoastalPlatforms()
}

if(e.key === "3"){
state = "village"
luna.x = 100
luna.y = 500
}

if(e.key === "4"){
state = "altar"
luna.x = W/2
luna.y = 450
}

/* START GAME (SPACE) */

if(state === "start" && e.key === " "){
state = "garden"
generateDigSpots()
digTimer = 0
}

})

window.addEventListener("keyup", e => {
keys[e.key] = false
})


/* TOUCH START (START BUTTON) */

canvas.addEventListener("click", e => {

let rect = canvas.getBoundingClientRect()
let x = (e.clientX - rect.left) * (canvas.width/rect.width)
let y = (e.clientY - rect.top) * (canvas.height/rect.height)

if((state === "win" || state === "gameover") &&
x > W/2-100 && x < W/2+100 &&
y > 470 && y < 520){
restartGame()
}

})

canvas.addEventListener("touchmove", e => {
e.preventDefault()
}, { passive: false })

canvas.addEventListener("touchstart", e => {

e.preventDefault()

let rect = canvas.getBoundingClientRect()
let touch = e.touches[0]

let x = (touch.clientX - rect.left) * (canvas.width/rect.width)
let y = (touch.clientY - rect.top) * (canvas.height/rect.height)

if(state === "start"){

if(
x > startButton.x &&
x < startButton.x + startButton.w &&
y > startButton.y &&
y < startButton.y + startButton.h
){
startGame()
}

}

if((state === "win" || state === "gameover") &&
x > W/2-100 && x < W/2+100 &&
y > 470 && y < 520){
restartGame()
}

/* MOBILE CONTROL BUTTONS */

let s = mobileControls.size / 2

function hit(b){
return Math.abs(x - b.x) < s && Math.abs(y - b.y) < s
}

touchLeft = hit(mobileControls.left)
touchRight = hit(mobileControls.right)

if(hit(mobileControls.center)){

if(showRingPopup){
// dismiss the popup directly - flag gets cleared before game loop runs
showRingPopup = false
state = "coastal"
luna.x = 50
luna.y = 500
scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
initCoastalPlatforms()
} else if(state === "altar"){
// give the rings directly if close enough
let distance = Math.hypot(luna.x - couple.x, luna.y - couple.y)
if(distance < 100){
spawnConfetti()
state = "win"
}
} else if(state === "garden"){
// trigger dig directly so it isn't cleared before the game loop reads it
if(nearDigSpot && digTimer === 0){
digTimer = 12
touchDigFired = true
}
} else {
// trigger jump directly so it isn't cleared before the game loop reads it
luna.vy = -8
}

}

if(state === "garden" || state === "altar"){

touchUp = hit(gardenControls.up)
touchDown = hit(gardenControls.down)

}

})

canvas.addEventListener("touchend", () => {

touchLeft = false
touchRight = false
touchJump = false
touchDig = false
touchUp = false
touchDown = false

})



/* START SCREEN */

function updateStart(){

if(keys[" "] || keys["Space"] || keys["Spacebar"] || touchJump){

state = "garden"
generateDigSpots()

}

}

function drawLuna(){

let frame = luna1
let bob = 0

/* DIGGING (garden level) */

if(state === "garden" && digTimer > 0){
frame = lunaDig
}

/* RUNNING */

else if(keys["ArrowLeft"] || keys["ArrowRight"] || touchLeft || touchRight){
let step = Math.floor(Date.now()/160) % 2
frame = step ? luna1 : luna2
bob = step ? -2 : 0

}

ctx.save()

ctx.translate(luna.x, luna.y + bob)
ctx.scale(luna.dir,1)

ctx.drawImage(
frame,
-50,
-65,
100,
100
)

ctx.restore()

}

function drawStart(){

ctx.drawImage(
startScreen,
0,
0,
W,
H
)

}

/* ENERGY */

function updateEnergy(){

energy -= 0.005

if(energy<=0){
state="gameover"
}

}

function drawMobileControls(){

if(!isMobile) return

let s = mobileControls.size

ctx.globalAlpha = 0.7

ctx.drawImage(btnLeft,
mobileControls.left.x - s/2,
mobileControls.left.y - s/2,
s,s)

ctx.drawImage(btnRight,
mobileControls.right.x - s/2,
mobileControls.right.y - s/2,
s,s)

let centerImage = (state === "garden" || state === "altar") ? btnDig : btnJump

ctx.drawImage(centerImage,
mobileControls.center.x - s/2,
mobileControls.center.y - s/2,
s,s)

/* EXTRA GARDEN/ALTAR BUTTONS */

if(state === "garden" || state === "altar"){

ctx.drawImage(btnJump,
gardenControls.up.x - s/2,
gardenControls.up.y - s/2,
s,s)

ctx.drawImage(btnJump,
gardenControls.down.x - s/2,
gardenControls.down.y - s/2,
s,s)

}

ctx.globalAlpha = 1

}


function drawUI(){

if(state === "start") return



/* UI BACKGROUND STRIP */

ctx.fillStyle = "rgba(255,255,255,0.6)"
ctx.fillRect(0,0,W,60)

/* RING ICON (TOP LEFT) */

if(hasRing){

ctx.drawImage(
ringbox,
20,
12,
36,
36
)

}


/* ENERGY BAR (TOP CENTRE) */

let barWidth = 160
let barHeight = 14
let barX = W/2 - barWidth/2
let barY = 25

// gravy bone icon
ctx.drawImage(
gravybone,
barX - 45,
barY - 12,
36,
36
)

// outline
ctx.strokeStyle = "#000"
ctx.lineWidth = 3
ctx.lineJoin = "round"
ctx.strokeRect(barX,barY,barWidth,barHeight)

// fill
ctx.fillStyle = "#8cff66"
ctx.fillRect(barX,barY,(energy/100)*barWidth,barHeight)


/* FLOWER COUNTER (TOP RIGHT) */

ctx.fillStyle = "#000"
ctx.font = "18px sans-serif"
ctx.textAlign = "right"

/* FLOWER COUNTER (TOP RIGHT) */

ctx.drawImage(
tulip,
W - 90,
10,
36,
36
)
ctx.fillText(
flowers,
W - 20,
35
)
drawMobileControls()

}

/* GARDEN LEVEL */

let digSpots=[]
let ringSpot=0

function generateDigSpots(){

digSpots = []

let startX = 120
let startY = 250

for(let y=0; y<3; y++){

for(let x=0; x<3; x++){

digSpots.push({
    x: startX + x*80,
    y: startY + y*80,
    dug: false
})

}

}

ringSpot = Math.floor(Math.random()*9)

}

function updateGarden(){

nearDigSpot = false

digSpots.forEach(s => {

let dx = Math.abs(luna.x - s.x)

if(dx < 60){
nearDigSpot = true
}

})

if(nearDigSpot && (keys[" "] || touchDig) && digTimer === 0){
digTimer = 12
}


// if popup is showing, wait for SPACE to continue


if(showRingPopup){

// wait for a NEW space press
if((keys[" "] || touchJump || touchDig) && !spacePressedLastFrame){

showRingPopup = false
state = "coastal"

luna.x = 50
luna.y = 500

scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
initCoastalPlatforms()

}

spacePressedLastFrame = keys[" "] || touchJump || touchDig
return
}

updateEnergy()

if(keys["ArrowRight"] || touchRight){
luna.x += 3
luna.dir = 1
}

if(keys["ArrowLeft"] || touchLeft){
luna.x -= 3
luna.dir = - 1
}

if(keys["ArrowUp"] || touchUp) luna.y-=3
if(keys["ArrowDown"] || touchDown) luna.y+=3

if(ringAnimTimer > 0){
ringAnimTimer--
if(ringAnimTimer === 0){
popupFadeTimer = 30
}
return
}

if(popupFadeTimer > 0){
popupFadeTimer--
if(popupFadeTimer === 0){
showRingPopup = true
}
return
}

digSpots.forEach((s,i)=>{

let d=Math.hypot(luna.x-s.x,luna.y-s.y)


if(d<30 && (keys[" "] || touchDigFired) && !s.dug){

s.dug = true
digTimer = 12

/* collect a flower */

flowers++

/* ring spot */

if(i===ringSpot){

hasRing = true
ringAnimTimer = 120  // ~2 second animation
ringAnimSpot = s
spacePressedLastFrame = true

}

}

})

touchDigFired = false

}


function drawGarden(){

// grass background
for(let x=0; x<W; x+=64){
for(let y=0; y<H; y+=64){

ctx.drawImage(
grasstile,
x,y,
64,64
)

}
}

// draw flowers / holes
digSpots.forEach(s=>{

// flower if not dug
if(!s.dug){

ctx.drawImage(
flowergrass,
s.x-16,
s.y-16,
64,
64
)

}

// dug hole if dug
if(s.dug){

ctx.drawImage(
dughole,
s.x-16,
s.y-16,
64,
64
)

}

})   // ← THIS closes the forEach loop

// final resting position matches popup ringbox exactly
const ringFinalX = W/2 - 40
const ringFinalY = H/2 - 70
const ringFinalSize = 80

// ring pop animation - floats up from hole to final position
if((ringAnimTimer > 0 || popupFadeTimer > 0 || showRingPopup) && ringAnimSpot){

// during anim: progress 0->1. after anim: stays at 1
let progress = ringAnimTimer > 0 ? 1 - (ringAnimTimer / 120) : 1

// easing - ease out so it slows as it arrives
let ease = 1 - Math.pow(1 - progress, 3)

let startSize = 20
let size = startSize + ease * (ringFinalSize - startSize)

let startX = ringAnimSpot.x - startSize/2
let startY = ringAnimSpot.y - startSize/2

let x = startX + ease * (ringFinalX - startX)
let y = startY + ease * (ringFinalY - startY)

// popup fading in behind the ring
if(popupFadeTimer > 0 || showRingPopup){
let fadeProgress = popupFadeTimer > 0 ? 1 - (popupFadeTimer / 30) : 1
ctx.globalAlpha = fadeProgress
ctx.fillStyle = "white"
ctx.beginPath()
ctx.roundRect(W/2-200, H/2-100, 400, 200, 20)
ctx.fill()
ctx.globalAlpha = 1
}

// draw ring at animated or final position
ctx.drawImage(ringbox, x, y, size, size)

// text appears only once fully faded in
if(showRingPopup){
ctx.fillStyle = "#333"
ctx.font = "20px sans-serif"
ctx.textAlign = "center"
ctx.fillText("Yay you found the rings!", W/2, H/2+30)
ctx.fillText("Let's make our way to the venue!", W/2, H/2+60)
}

}

// hide Luna during animation and popup
if(!showRingPopup && ringAnimTimer === 0 && popupFadeTimer === 0){
drawLuna()
}

}


/* COASTAL LEVEL */

let bones=[]
let flowersCoastal=[]
let platformsCoastal=[]
let scroll=0

function noOverlap(x, w){
// returns true if this x position is clear of all existing platforms
return !platformsCoastal.some(p =>
x < p.x + p.w + 60 && x + w > p.x - 60
)
}

function spawnPlatformCluster(){

let last = platformsCoastal[platformsCoastal.length-1]
if(last && last.x > W) return

// three distinct height tiers
let lowTier   = [460, 440, 480]
let highTier  = [320, 350, 370, 390]
let skyTier   = [270, 290, 310]

let count = 1 + Math.floor(Math.random()*4)
let startX = W + 80
let lastTier = "low"

for(let i=0; i<count; i++){

let width = Math.random() < 0.4 ? 192 :
            Math.random() < 0.5 ? 96 : 128

// tier selection - sky only reachable from high, so sequence sensibly
let tier
let r = Math.random()
if(lastTier === "high" && r < 0.3){
tier = skyTier
lastTier = "sky"
} else if(lastTier === "sky"){
// always step back down after sky
tier = highTier
lastTier = "high"
} else if(r < 0.4){
tier = highTier
lastTier = "high"
} else {
tier = lowTier
lastTier = "low"
}

let nextY = tier[Math.floor(Math.random()*tier.length)]

// skip if this x overlaps an existing platform
if(!noOverlap(startX, width)){
startX += width + 120
continue
}

let p = { x: startX, y: nextY, w: width }
platformsCoastal.push(p)

// flower and bone at different x positions so they never stack
let hasFlower = Math.random() < 0.6
let hasBone   = Math.random() < 0.35

if(hasFlower){
flowersCoastal.push({
x: p.x + p.w * 0.25,
y: p.y - 55
})
}

if(hasBone){
bones.push({
x: p.x + p.w * (hasFlower ? 0.7 : 0.5),
y: p.y - 55
})
}

startX += width + 80 + Math.floor(Math.random()*80)

}

}

function initCoastalPlatforms(){

platformsCoastal = []
flowersCoastal = []
bones = []

// hand-crafted first few platforms across both tiers
let starts = [
{ x: 200, y: 460, w: 128 },
{ x: 380, y: 370, w: 96  },
{ x: 530, y: 450, w: 192 },
{ x: 780, y: 340, w: 128 },
{ x: 960, y: 280, w: 96  },
{ x: 1110, y: 460, w: 128 },
]

starts.forEach((p, i) => {
platformsCoastal.push(p)
flowersCoastal.push({ x: p.x + p.w * 0.25, y: p.y - 55 })
if(i % 2 === 0){
bones.push({ x: p.x + p.w * 0.7, y: p.y - 55 })
}
})

}



function updateCoastal(){


updateEnergy()

/* movement */


if(keys["ArrowRight"] || touchRight){
luna.x+=3
luna.dir=1
}

if(keys["ArrowLeft"] || touchLeft){
luna.x-=3
luna.dir=-1
}

/* RUNNING DUST */

if((keys["ArrowLeft"] || keys["ArrowRight"]) && luna.y >= 500){

if(Math.random() < 0.25){

dust.push({
x: luna.x - luna.dir * 25,
y: luna.y + 10,
vx: (Math.random()-0.5)*0.5,
vy: -0.3,
life: 20
})

}

}

/* jump */

if(keys[" "] || touchJump && luna.vy==0){
luna.vy=-8
}

/* gravity */

luna.vy+=0.6
luna.y+=luna.vy

platformsCoastal = platformsCoastal.filter(p => p.x + p.w > -20)
flowersCoastal = flowersCoastal.filter(f => f.x > -20)
bones = bones.filter(b => b.x > -20)


/* platform collision */

let onPlatform=false

platformsCoastal.forEach(p=>{

if(
luna.x > p.x - 20 &&
luna.x < p.x + p.w + 20 &&
luna.y > p.y - 20 &&
luna.y < p.y + 20 &&
luna.vy >= 0
){
luna.y = p.y
luna.vy = 0
}
})

/* ground collision */

let groundY=510

if(!onPlatform && luna.y>groundY){
luna.y=groundY
luna.vy=0
}

/* scrolling */

scroll+=3

/* spawn platforms */

if(Math.random()<0.03) spawnPlatformCluster()

/* move platforms */

platformsCoastal.forEach(p=>{
p.x-=3
})

/* move flowers */

flowersCoastal.forEach(f=>{

f.x-=3

if(Math.abs(f.x-luna.x)<20 && Math.abs(f.y-luna.y)<25){
flowers++
f.x=-100
}

})

/* move bones */

bones.forEach(b=>{

b.x-=3

if(Math.abs(b.x-luna.x)<20 && Math.abs(b.y-luna.y)<25){
energy=Math.min(100,energy+35)
b.x=-100
}

})

/* level end */

if(scroll > 4500){
state="village"
scroll = 0
obstacles = []
bonesVillage = []
flowersVillage = []
luna.x = 100
luna.y = 540
}

}

function drawCoastal(){

/* SKY */

let sky=ctx.createLinearGradient(0,0,0,H)
sky.addColorStop(0,"#dbe9f4")
sky.addColorStop(1,"#9ec9e6")

ctx.fillStyle=sky
ctx.fillRect(0,0,W,H)

/* SEA */

for(let x=-(scroll*0.3%256); x<W; x+=256){

ctx.drawImage(
sea,
x,
350,
256,
140
)

}

/* GROUND FLOWER GRASS */

/* PURPLE GRASS (TOP ROW) */

for(let x = -(scroll % 128); x < W; x += 128){

ctx.drawImage(
purplegrass,
x,
420,
128,
80
)

}


/* PATH (LUNA RUNS HERE) */

for(let x = -(scroll % 128); x < W; x += 128){

ctx.drawImage(
sandpath,
x,
500,
128,
80
)

}


/* GRASS BELOW PATH */

for(let x = -(scroll % 128); x < W; x += 128){

ctx.drawImage(
grasstile,
x,
560,
128,
140
)

}

/* FLOATING PLATFORMS (drawn after ground so they appear on top) */

platformsCoastal.forEach(p=>{

if(p.w >= 192){
// use double tile image for wide platforms
ctx.drawImage(doublegrassplatform, p.x, p.y, 192, 96)
// if wider than 2 tiles, continue with single tiles
for(let tx = 192; tx < p.w; tx += 96){
ctx.drawImage(grassplatform, p.x + tx, p.y, 96, 96)
}
} else {
for(let tx = 0; tx < p.w; tx += 96){
ctx.drawImage(grassplatform, p.x + tx, p.y, 96, 96)
}
}

})


/* FLOWERS */

flowersCoastal.forEach(f=>{

ctx.drawImage(
tulip,
f.x-16,
f.y-32,
64,
64
)

})


/* BONES */

bones.forEach(b=>{

ctx.drawImage(
gravybone,
b.x-16,
b.y-16,
64,
64
)

})


/* LUNA */

drawLuna()

}


/* VILLAGE */

let obstacles=[]
let bonesVillage=[]
let flowersVillage=[]

function spawnObstacle(){

let minGap = 180

if(obstacles.length > 0){

let last = obstacles[obstacles.length-1]

if(W - last.x < minGap) return

}

obstacles.push({
x:W+100,
y:510,
hit:false,
type: Math.floor(Math.random()*3)
})

}

function spawnVillageFlower(){

flowersVillage.push({
x: W + 100,
y: 530
})

}


function spawnVillageBone(){

bonesVillage.push({
x:W+100,
y:440
})

}

function updateVillage(){

scroll += 3

if(keys["ArrowRight"] || touchRight){
luna.x += 3
luna.dir = 1
}

if(keys["ArrowLeft"] || touchLeft){
luna.x -= 3
luna.dir = - 1
}

if(Math.random()<0.01) spawnVillageFlower()

flowersVillage.forEach(f=>{
f.x -= 4
})

flowersVillage.forEach(f=>{

if(Math.abs(f.x-luna.x)<20 && Math.abs(f.y-luna.y)<25){

flowers++
f.x = -100

}

})

/* RUNNING DUST */

if((keys["ArrowLeft"] || keys["ArrowRight"]) && luna.y >= 500){

if(Math.random() < 0.25){

dust.push({
x: luna.x - luna.dir * 25,
y: luna.y + 10,
vx: (Math.random()-0.5)*0.5,
vy: -0.3,
life: 20
})

}

}

updateEnergy()
if(Math.random()<0.006) spawnVillageBone()
if(Math.random()<0.03) spawnObstacle()

bonesVillage.forEach(b=>{

b.x -= 4

if(Math.abs(b.x-luna.x)<25 && Math.abs(b.y-luna.y)<40){

energy = Math.min(100, energy + 30)
b.x = -100

}

})

obstacles.forEach(o=>{

o.x-=4

if(
Math.abs(o.x - luna.x) < 35 &&
Math.abs(o.y - luna.y) < 80 &&
!o.hit
){
energy -= 10
o.hit = true
}

})

if(keys[" "]|| touchJump && luna.y===540){
luna.vy=-10
}

luna.vy+=0.5
luna.y+=luna.vy

if(luna.y>540){
luna.y=540
luna.vy=0
}

if(scroll > 4500){
state="altar"
luna.x = W/2
luna.y = 450
}

}

function drawVillage(){


/* SKY */

let sky = ctx.createLinearGradient(0,0,0,H)
sky.addColorStop(0,"#e6f2ff")
sky.addColorStop(1,"#ffffff")

ctx.fillStyle = sky
ctx.fillRect(0,0,W,H)


/* FIELDS BACKGROUND */

ctx.fillStyle = "#cfe8a9"
ctx.fillRect(0, 260, W, 120)

for(let x = -(scroll % 200); x < W + 200; x += 200){

ctx.fillStyle = "#b8db7a"
ctx.fillRect(x, 280, 200, 80)

}

ctx.fillStyle = "#6fa64e"
ctx.fillRect(0, 340, W, 100)

for(let i=0;i<8;i++){

let fx = (i*120 - scroll*0.2) % (W+120)

ctx.fillStyle="#ffffff"
ctx.beginPath()
ctx.arc(fx, 320, 3, 0, Math.PI*2)
ctx.fill()

}





/* BACKGROUND HOUSES */

/* BACKGROUND HOUSE ROW */

/* BACKGROUND HOUSE ROW */

let rowWidth = 2520
let scale = 0.35
let drawWidth = rowWidth * scale

for(let x = -(scroll * 0.3 % drawWidth); x < W + drawWidth; x += drawWidth){

ctx.drawImage(
houseRow,
x,
220,
drawWidth,
630 * scale
)

}


for(let x = -(scroll * 0.3 % 128); x < W; x += 128){
ctx.drawImage(
bggrass,
x,
440,
128,
80
)
}

/* COBBLE PATH */

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,518,W,3)

for(let x = -(scroll % 128); x < W; x += 128){

ctx.drawImage(
path,
x,
500,
128,
80
)

}

/* GRASS BELOW PATH */


for(let x = -(scroll % 128); x < W; x += 128){

ctx.drawImage(
grasstile,
x,
560,
128,
80
)

ctx.drawImage(
grasstile,
x,
600,
200,
100
)



}


obstacles.forEach(o=>{



/* SEAGULL — top of path */

if(o.type === 2){

ctx.drawImage(
seagull,
o.x,
450,
80,
70
)

}


/* FLOWERPOT — middle of path */

if(o.type === 0){

ctx.drawImage(
flowerpot,
o.x,
470,
80,
80
)

}


/* CRATE — bottom of path */

if(o.type === 1){

ctx.drawImage(
crate,
o.x,
490,
90,
80
)

}

})


bonesVillage.forEach(b=>{

ctx.drawImage(
gravybone,
b.x,
b.y,
40,
40
)
})


/* VILLAGE FLOWERS */

flowersVillage.forEach(f=>{

ctx.drawImage(
tulip,
f.x,
f.y,
50,
50
)

})


drawLuna()

}

/* ALTAR */

function updateAltar(){

if(keys["ArrowLeft"] || touchLeft) luna.x -= 3
if(keys["ArrowRight"] || touchRight) luna.x += 3
if(keys["ArrowUp"] || touchUp) luna.y -= 3
if(keys["ArrowDown"] || touchDown) luna.y += 3

/* check if Luna reached the couple */

let distance = Math.hypot(
luna.x - couple.x,
luna.y - couple.y
)

if(distance < 100 && keys[" "]){
spawnConfetti()
state = "win"
}

}


function drawAltar(){

ctx.fillStyle="#ffe4e1"
ctx.fillRect(0,0,W,H)

ctx.fillStyle="#8b0000"
ctx.fillRect(W/2-40,0,80,H)

ctx.drawImage(
jonny1,
couple.x - 70,
couple.y - 60,
120,
160
)

ctx.drawImage(
lottie1,
couple.x + 10,
couple.y - 60,
120,
160
)

ctx.fillStyle="white"
ctx.font="18px sans-serif"
ctx.textAlign="center"

ctx.fillText(
isMobile ? "Tap the centre button to hand over the rings!" : "Press SPACE to hand over the rings!",
W/2,
500
)

drawLuna()

}

/* END SCREENS */

function drawWin(){

ctx.fillStyle="#fff9f0"
ctx.fillRect(0,0,W,H)

confetti.forEach(c=>{
c.x += c.vx
c.y += c.vy
c.vy += 0.1
ctx.fillStyle = c.color
ctx.fillRect(c.x, c.y, c.size, c.size)
})

ctx.fillStyle="#333"
ctx.textAlign="center"
ctx.font="28px sans-serif"
ctx.fillText("Congratulations Jonny & Lottie!",W/2,260)

ctx.font="18px sans-serif"
ctx.fillText("Luna delivered the rings!",W/2,300)

ctx.font="16px sans-serif"
ctx.fillText("🌷 Flowers collected: " + flowers, W/2, 350)
ctx.fillText("⚡ Energy remaining: " + Math.round(energy) + "%", W/2, 380)

let score = flowers * 10 + Math.round(energy)
ctx.font="bold 22px sans-serif"
ctx.fillStyle="#e05cb0"
ctx.fillText("Total score: " + score, W/2, 430)

// restart button
ctx.fillStyle="#e05cb0"
ctx.beginPath()
ctx.roundRect(W/2-100, 470, 200, 50, 25)
ctx.fill()

ctx.fillStyle="white"
ctx.font="bold 18px sans-serif"
ctx.fillText("Play again 🐾", W/2, 501)

}

function drawGameOver(){

ctx.fillStyle="#1a1a2e"
ctx.fillRect(0,0,W,H)

ctx.fillStyle="white"
ctx.textAlign="center"
ctx.font="24px sans-serif"

ctx.fillText("Oh no!",W/2,260)
ctx.fillText("Luna took a nap",W/2,300)
ctx.fillText("and missed the wedding!",W/2,340)

ctx.font="16px sans-serif"
ctx.fillText("🌷 Flowers collected: " + flowers, W/2, 385)

let score = flowers * 10 + Math.round(energy)
ctx.font="bold 22px sans-serif"
ctx.fillStyle="#aaa"
ctx.fillText("Total score: " + score, W/2, 425)

// restart button
ctx.fillStyle="#555"
ctx.beginPath()
ctx.roundRect(W/2-100, 460, 200, 50, 25)
ctx.fill()

ctx.fillStyle="white"
ctx.font="bold 18px sans-serif"
ctx.fillText("Try again 🐾", W/2, 491)

}

/* PLAYER */


function spawnConfetti(){

for(let i=0;i<150;i++){

confetti.push({

x: couple.x,
y: couple.y,

vx: (Math.random()-0.5)*6,
vy: Math.random()*-6,

size: Math.random()*6+3,

color: [
"#ff4d6d",
"#ffd166",
"#06d6a0",
"#118ab2",
"#ffffff"
][Math.floor(Math.random()*5)]

})

}

}


/* GAME LOOP */

function startGame(){
state = "garden"
generateDigSpots()
}

function restartGame(){
energy = 100
flowers = 0
hasRing = false
showRingPopup = false
ringAnimTimer = 0
ringAnimSpot = null
popupFadeTimer = 0
confetti = []
dust = []
scroll = 0
platformsCoastal = []
flowersCoastal = []
bones = []
obstacles = []
bonesVillage = []
flowersVillage = []
luna.x = 200
luna.y = 500
luna.vx = 0
luna.vy = 0
state = "garden"
generateDigSpots()
digTimer = 0
}



function update(){

if(state==="garden") updateGarden()
if(state==="coastal") updateCoastal()
if(state==="village") updateVillage()
if(state==="altar") updateAltar()

if(digTimer > 0){
digTimer--
}

dust.forEach(d=>{
d.x += d.vx
d.y += d.vy
d.life--
})

dust = dust.filter(d=>d.life>0)

}

function draw(){

if(state==="start"){
drawStart()
return
}

if(state==="win"){
drawWin()
return
}

if(state==="gameover"){
drawGameOver()
return
}

if(state==="garden") drawGarden()
if(state==="coastal") drawCoastal()
if(state==="village") drawVillage()
if(state==="altar") drawAltar()

drawUI()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
